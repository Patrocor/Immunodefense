<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a0e12">
<title>ImmunoDefense</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    overflow: hidden;
    background: #1a0e12;
    width: 100%;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Fredoka, sans-serif;
    color: #fff;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    overscroll-behavior: none;
  }
  #canvas {
    display: block;
    width: 100%;
    height: 100%;
    background: #1a0e12;
    touch-action: none;
  }
  #__safe_probe {
    position: fixed;
    top: 0; left: 0;
    width: 0; height: 0;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    visibility: hidden;
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="__safe_probe"></div>
<!-- DEBUG: medida ground-truth en HTML, fuera del canvas. Tres barras de
     color en TOP/MID/BOTTOM del viewport. Si el canvas está bien alineado,
     la banda magenta (canvas y=0) debería coincidir con la barra ROJA arriba. -->
<div id="dbg-top"    style="position:fixed; top:0;    left:0; right:0; height:6px; background:#ff0000; z-index:9999; pointer-events:none;"></div>
<div id="dbg-mid"    style="position:fixed; top:50%;  left:0; right:0; height:6px; background:#00ff00; z-index:9999; pointer-events:none; transform:translateY(-3px);"></div>
<div id="dbg-bottom" style="position:fixed; bottom:0; left:0; right:0; height:6px; background:#0080ff; z-index:9999; pointer-events:none;"></div>
<script src="game.js" defer></script>
</body>
</html>
