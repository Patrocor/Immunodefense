<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a0e12">
<title>ImmunoDefense</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    overflow: hidden;
    background: #1a0e12;
    width: 100%;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Fredoka, sans-serif;
    color: #fff;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    overscroll-behavior: none;
  }
  #canvas {
    display: block;
    width: 100%;
    height: 100%;
    background: #1a0e12;
    touch-action: none;
  }
  #__safe_probe {
    position: fixed;
    top: 0; left: 0;
    width: 0; height: 0;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    visibility: hidden;
    pointer-events: none;
  }
  /* ──── Overlay "girá el teléfono" ──── */
  #rotate-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, #2a0d18 0%, #07030a 70%);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 24px;
    pointer-events: auto;
  }
  @media (orientation: portrait) {
    #rotate-overlay { display: flex; }
  }
  #rotate-overlay .phone-wrap {
    width: 88px;
    height: 144px;
    position: relative;
    animation: phoneRotate 2.6s cubic-bezier(.5,.05,.3,1) infinite;
    margin-bottom: 28px;
  }
  #rotate-overlay .phone {
    position: absolute;
    inset: 0;
    border: 4px solid #ffd2a0;
    border-radius: 16px;
    background: rgba(255, 220, 170, 0.08);
    box-shadow: 0 0 24px rgba(255, 200, 140, 0.45);
  }
  #rotate-overlay .phone::before {
    /* Notch superior */
    content: "";
    position: absolute;
    top: -2px; left: 50%;
    transform: translateX(-50%);
    width: 30px; height: 5px;
    background: #ffd2a0;
    border-radius: 0 0 6px 6px;
  }
  #rotate-overlay .phone::after {
    /* Botón inferior (home) */
    content: "";
    position: absolute;
    bottom: 8px; left: 50%;
    transform: translateX(-50%);
    width: 28px; height: 4px;
    background: rgba(255, 210, 160, 0.65);
    border-radius: 3px;
  }
  #rotate-overlay .arrow {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 36px;
    color: #ffd24a;
    opacity: 0;
    animation: arrowFade 2.6s cubic-bezier(.5,.05,.3,1) infinite;
    text-shadow: 0 0 12px rgba(255, 210, 100, 0.7);
  }
  @keyframes phoneRotate {
    0%, 30%   { transform: rotate(0deg); }
    55%, 75%  { transform: rotate(-90deg); }
    100%      { transform: rotate(-90deg); }
  }
  @keyframes arrowFade {
    0%, 25%   { opacity: 0; }
    35%, 60%  { opacity: 1; }
    75%, 100% { opacity: 0; }
  }
  #rotate-overlay h2 {
    margin: 0 0 8px 0;
    font-family: Fredoka, sans-serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 0.5px;
    color: #ffd2a0;
  }
  #rotate-overlay p {
    margin: 0;
    font-family: Fredoka, sans-serif;
    font-weight: 400;
    font-size: 14px;
    color: rgba(255, 220, 180, 0.65);
    max-width: 280px;
    line-height: 1.4;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="__safe_probe"></div>
<div id="rotate-overlay">
  <div class="phone-wrap">
    <div class="phone"></div>
    <div class="arrow">↻</div>
  </div>
  <h2>Girá el teléfono</h2>
  <p>ImmunoDefense se juega en horizontal para que el campo de batalla respire.</p>
</div>
<script src="game.js" defer></script>
</body>
</html>
