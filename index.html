      ctx.fillText(ef.text, ef.x, ef.y);
      ctx.globalAlpha = 1;
    } else if (ef.kind === "confetti") {
      ctx.save();
      ctx.translate(ef.x, ef.y);
      ctx.rotate(ef.rot);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = ef.color;
      ctx.fillRect(-ef.size, -ef.size * 0.4, ef.size * 2, ef.size * 0.8);
      ctx.globalAlpha = 1;
      ctx.restore();
    }
  }

  function drawCardIcon(typeId, cx, cy, R, enabled) {
    var def = TOWER_DEFS[typeId];
    ctx.save();
    ctx.translate(cx, cy);
    var grad = ctx.createRadialGradient(-R * 0.3, -R * 0.3, R * 0.2, 0, 0, R);
    var hot = enabled ? def.color : "#666";
    grad.addColorStop(0, "#ffffff");
    grad.addColorStop(0.4, hot);
    grad.addColorStop(1, def.colorDark);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, R, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = def.colorDark;
    ctx.lineWidth = 1.2;
    ctx.stroke();
    if (typeId === "linfocitoB") {
      // 3 mini Y antibodies
      for (var i = 0; i < 3; i++) {
        var a = i * Math.PI * 2 / 3 - Math.PI / 2;
        drawMiniY(Math.cos(a) * R * 1.2, Math.sin(a) * R * 1.2, R * 0.3, a + Math.PI / 2);
      }
    } else if (typeId === "linfocitoT") {
      // Granules
      for (var g = 0; g < 4; g++) {
        var ga = g * Math.PI * 0.5 + 0.4;
        ctx.fillStyle = "rgba(255, 240, 180, 0.85)";
        ctx.beginPath();
        ctx.arc(Math.cos(ga) * R * 0.5, Math.sin(ga) * R * 0.5, R * 0.13, 0, Math.PI * 2);
        ctx.fill();
      }
    } else {
      // Macrofago: small bumps
      for (var b = 0; b < 5; b++) {
        var ba = b * Math.PI * 2 / 5;
        ctx.fillStyle = hot;
        ctx.beginPath();
        ctx.arc(Math.cos(ba) * R * 0.95, Math.sin(ba) * R * 0.95, R * 0.30, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = def.colorDark;
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }
    // tiny eyes
    var eyeR = R * 0.16;
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(-R * 0.25, -R * 0.05, eyeR, 0, Math.PI * 2);
    ctx.arc( R * 0.25, -R * 0.05, eyeR, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#1a1a22";
    ctx.beginPath();
    ctx.arc(-R * 0.25, -R * 0.05, eyeR * 0.55, 0, Math.PI * 2);
    ctx.arc( R * 0.25, -R * 0.05, eyeR * 0.55, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawMiniY(cx, cy, size, rot) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(rot);
    ctx.strokeStyle = "#2c8049";
    ctx.fillStyle = "#fff7c4";
    ctx.lineWidth = 1.4;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(0, size);
    ctx.lineTo(0, -size * 0.2);
    ctx.moveTo(0, -size * 0.2);
    ctx.lineTo(-size * 0.7, -size);
    ctx.moveTo(0, -size * 0.2);
    ctx.lineTo(size * 0.7, -size);
    ctx.stroke();
    ctx.restore();
  }

  function drawAmbient() {
    if (!state.ambient || !state.ambient.length) return;
    for (var i = 0; i < state.ambient.length; i++) {
      var a = state.ambient[i];
      var pulse = 0.7 + 0.3 * Math.sin(a.phase);
      ctx.fillStyle = "rgba(231, 100, 110, " + (a.alpha * pulse) + ")";
      ctx.beginPath();
      ctx.arc(a.x, a.y, a.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawHUD() {
    ctx.fillStyle = "#3a2530";
    ctx.fillRect(0, 0, VW, FIELD_TOP);
    ctx.fillStyle = "rgba(255,255,255,0.06)";
    ctx.fillRect(0, FIELD_TOP - 2, VW, 2);

    var leftX = safeLeft + 12;
    if (isPortrait) {
      // Compact single-line stats: no labels, tiny gap, fits beside buttons.
      var midY = safeTop + (HUD_H - safeTop) / 2;
      ctx.textBaseline = "middle";
      ctx.textAlign = "left";
      ctx.font = "bold 14px sans-serif";
      ctx.fillStyle = "#f5d76e";
      ctx.fillText("⚡ " + state.atp, leftX, midY);
      ctx.fillStyle = state.lives <= 5 ? "#ff7878" : "#9adfb1";
      ctx.fillText("♥ " + state.lives, leftX + 64, midY);
      ctx.fillStyle = "#e0e0e0";
      ctx.fillText("⌖ " + state.waveIdx + "/" + WAVES.length, leftX + 118, midY);
    } else {
      var statsY = safeTop + 8;
      var fontStat = Math.max(14, Math.min(20, VW * 0.018));
      var fontLabel = Math.max(10, Math.min(13, VW * 0.012));
      drawHudStat("⚡ ATP", state.atp, leftX, statsY, "#f5d76e", fontStat, fontLabel);
      drawHudStat("♥ Vida", state.lives, leftX + Math.min(160, VW * 0.22), statsY,
        state.lives <= 5 ? "#ff7878" : "#9adfb1", fontStat, fontLabel);
      drawHudStat("⌖ Oleada", state.waveIdx + " / " + WAVES.length,
        leftX + Math.min(320, VW * 0.44), statsY, "#e0e0e0", fontStat, fontLabel);
    }

    var nwLabel = isPortrait ? "▶ Oleada" : "▶ Iniciar Oleada";
    if (!state.waveActive && state.waveIdx < WAVES.length) {
      var pulse = 0.5 + 0.5 * Math.sin(state.time * 3.5);
      ctx.save();
      ctx.shadowColor = "rgba(31, 138, 76, " + (0.5 + pulse * 0.45) + ")";
      ctx.shadowBlur = 8 + pulse * 14;
      drawButton(UI.nextWaveBtn, nwLabel, "#1f8a4c", "#16632f", true);
      ctx.restore();
    } else if (state.waveActive) {
      drawButton(UI.nextWaveBtn, isPortrait ? "En curso..." : "Oleada en curso...", "#5a4250", "#3a2530", false);
    } else {
      drawButton(UI.nextWaveBtn, isPortrait ? "Fin" : "Sin mas oleadas", "#5a4250", "#3a2530", false);
    }

    var rb = UI.restartBtn;
    ctx.fillStyle = "#5a3540";
    roundRect(rb.x, rb.y, rb.w, rb.h, 8);
    ctx.fill();
    ctx.strokeStyle = "#3a2530";
    ctx.lineWidth = 1.5;
    roundRect(rb.x, rb.y, rb.w, rb.h, 8);
    ctx.stroke();
    drawRestartIcon(rb.x + rb.w / 2, rb.y + rb.h / 2, rb.h * 0.32, "#fff");

    // Mute button
    var mb = UI.muteBtn;
    ctx.fillStyle = "#5a3540";
    roundRect(mb.x, mb.y, mb.w, mb.h, 8);
    ctx.fill();
    ctx.strokeStyle = "#3a2530";
    ctx.lineWidth = 1.5;
    roundRect(mb.x, mb.y, mb.w, mb.h, 8);
    ctx.stroke();
    drawSpeakerIcon(mb.x + mb.w / 2, mb.y + mb.h / 2, mb.h * 0.36, audio.muted, "#fff");
  }

  function drawSpeakerIcon(cx, cy, r, muted, color) {
    ctx.save();
    ctx.fillStyle = color;
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    // Speaker box + cone
    ctx.beginPath();
    ctx.moveTo(cx - r * 0.85, cy - r * 0.30);
    ctx.lineTo(cx - r * 0.30, cy - r * 0.30);
    ctx.lineTo(cx + r * 0.10, cy - r * 0.70);
    ctx.lineTo(cx + r * 0.10, cy + r * 0.70);
    ctx.lineTo(cx - r * 0.30, cy + r * 0.30);
    ctx.lineTo(cx - r * 0.85, cy + r * 0.30);
    ctx.closePath();
    ctx.fill();
    if (muted) {
      // X over speaker
      ctx.strokeStyle = "#ff7878";
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(cx + r * 0.30, cy - r * 0.50);
      ctx.lineTo(cx + r * 0.95, cy + r * 0.50);
      ctx.moveTo(cx + r * 0.95, cy - r * 0.50);
      ctx.lineTo(cx + r * 0.30, cy + r * 0.50);
      ctx.stroke();
    } else {
      // Sound waves
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.arc(cx + r * 0.10, cy, r * 0.42, -Math.PI * 0.35, Math.PI * 0.35);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(cx + r * 0.10, cy, r * 0.70, -Math.PI * 0.30, Math.PI * 0.30);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawRestartIcon(cx, cy, r, color) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.2;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.arc(cx, cy, r, Math.PI * 0.25, Math.PI * 1.85);
    ctx.stroke();
    // arrow tip
    var ang = Math.PI * 1.85;
    var ax = cx + Math.cos(ang) * r;
    var ay = cy + Math.sin(ang) * r;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax - r * 0.55, ay - r * 0.05);
    ctx.lineTo(ax - r * 0.05, ay - r * 0.55);
    ctx.closePath();
    ctx.fill();
  }

  function drawHudStat(label, value, x, y, color, fontStat, fontLabel) {
    ctx.fillStyle = "rgba(255,255,255,0.55)";
    ctx.font = fontLabel + "px sans-serif";
    ctx.textAlign = "left";
    ctx.textBaseline = "top";
    ctx.fillText(label, x, y);
    ctx.fillStyle = color;
    ctx.font = "bold " + fontStat + "px sans-serif";
    ctx.fillText(value, x, y + fontLabel + 4);
  }

  function drawButton(r, text, fill, stroke, enabled) {
    ctx.fillStyle = fill;
    roundRect(r.x, r.y, r.w, r.h, 8);
    ctx.fill();
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 1.5;
    roundRect(r.x, r.y, r.w, r.h, 8);
    ctx.stroke();
    ctx.fillStyle = enabled ? "#fff" : "rgba(255,255,255,0.55)";
    var fs = Math.max(11, Math.min(14, r.h * 0.36));
    ctx.font = "bold " + fs + "px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(text, r.x + r.w / 2, r.y + r.h / 2);
  }

  function roundRect(x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h - r);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function drawPanel() {
    ctx.fillStyle = "#2a1a22";
    ctx.fillRect(0, FIELD_BOTTOM, VW, VH - FIELD_BOTTOM);

    for (var i = 0; i < TOWER_LIST.length; i++) {
      var typeId = TOWER_LIST[i];
      var def = TOWER_DEFS[typeId];
      var card = UI.cards[i];
      var canAfford = state.atp >= def.cost;
      var isSelected = state.selectedToBuild === typeId;
      var lift = isSelected ? 4 : 0;
      var scale = isSelected ? 1.05 : 1.0;
      var cw = card.w * scale, ch = card.h * scale;
      var cardX = card.x - (cw - card.w) / 2;
      var cardY = card.y - lift - (ch - card.h) / 2;

      if (isSelected) {
        ctx.shadowColor = "rgba(0, 0, 0, 0.45)";
        ctx.shadowBlur = 8;
        ctx.shadowOffsetY = 4;
      }
      ctx.fillStyle = isSelected ? "#3a2538" : "#1f1219";
      roundRect(cardX, cardY, cw, ch, 8);
      ctx.fill();
      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;
      ctx.shadowOffsetY = 0;
      ctx.strokeStyle = isSelected ? def.color : "rgba(255,255,255,0.08)";
      ctx.lineWidth = isSelected ? 3 : 1.5;
      roundRect(cardX, cardY, cw, ch, 8);
      ctx.stroke();

      var cx = cardX + cw / 2;
      var iconY = cardY + ch * 0.30;
      var showDesc = card.w >= 120;
      drawCardIcon(typeId, cx, iconY, Math.min(20, cw * 0.20) * (canAfford ? 1 : 0.6), canAfford);

      ctx.fillStyle = canAfford ? "#fff" : "rgba(255,255,255,0.45)";
      var fs1 = Math.max(10, Math.min(13, cw * 0.14));
      ctx.font = "bold " + fs1 + "px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      ctx.fillText(def.name, cx, cardY + ch * (showDesc ? 0.55 : 0.58));

      if (showDesc) {
        ctx.font = Math.max(9, Math.min(11, cw * 0.10)) + "px sans-serif";
        ctx.fillStyle = "rgba(255,255,255,0.55)";
        ctx.fillText(def.desc, cx, cardY + ch * 0.70);
      }

      ctx.font = "bold " + Math.max(11, Math.min(13, cw * 0.13)) + "px sans-serif";
      ctx.fillStyle = canAfford ? "#f5d76e" : "#d9534f";
      ctx.fillText("⚡ " + def.cost, cx, cardY + ch * (showDesc ? 0.84 : 0.80));
    }

    var infoX = UI.infoX, infoY = UI.infoY;
    ctx.textAlign = "left";
    ctx.textBaseline = "top";
    if (state.selectedTower) {
      var t = state.selectedTower;
      var stats = towerStats(t);
      ctx.fillStyle = t.def.color;
      ctx.font = "bold 15px sans-serif";
      ctx.fillText(t.def.name + "  Nv " + (t.level + 1) + "/3", infoX, infoY + 2);

      ctx.font = "12px sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.85)";
      if (isPortrait) {
        var oneLine = "Dmg " + stats.damage + (stats.splash > 0 ? " (AOE)" : "") +
          " • R " + stats.range + " • " + stats.fireRate.toFixed(1) + "/s";
        ctx.fillText(oneLine, infoX, infoY + 22);
      } else {
        ctx.fillText("Daño: " + stats.damage + (stats.splash > 0 ? "  AOE: " + stats.splash : ""), infoX, infoY + 24);
        ctx.fillText("Rango: " + stats.range + "    Cadencia: " + stats.fireRate.toFixed(2) + "/s", infoX, infoY + 40);
      }

      ctx.fillStyle = "rgba(255,255,255,0.1)";
      roundRect(UI.deselectBtn.x, UI.deselectBtn.y, UI.deselectBtn.w, UI.deselectBtn.h, 6);
      ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,0.7)";
      ctx.font = "bold 11px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(isPortrait ? "X cerrar" : "Deseleccionar",
        UI.deselectBtn.x + UI.deselectBtn.w / 2,
        UI.deselectBtn.y + UI.deselectBtn.h / 2 + 4);
      ctx.textAlign = "left";

      var sellRefund = Math.floor(t.def.cost * 0.6);
      for (var li = 0; li < t.level; li++) sellRefund += Math.floor(t.def.upgradeCost[li] * 0.5);
      drawButton(UI.sellBtn, "Vender +" + sellRefund, "#7a3a3a", "#552020", true);

      if (t.level < 2) {
        var ucost = t.def.upgradeCost[t.level];
        var canUp = state.atp >= ucost;
        drawButton(UI.upgradeBtn,
          "Mejorar Nv " + (t.level + 2) + "  ⚡" + ucost,
          canUp ? "#1f8a4c" : "#3a2530",
          canUp ? "#16632f" : "#22141c",
          canUp);
      } else {
        drawButton(UI.upgradeBtn, "Nivel maximo", "#5a4250", "#3a2530", false);
      }
    } else if (state.selectedToBuild) {
      var def2 = TOWER_DEFS[state.selectedToBuild];
      ctx.fillStyle = def2.color;
      ctx.font = "bold 15px sans-serif";
      ctx.fillText(def2.name + " — " + def2.desc, infoX, infoY + 4);
      ctx.font = "12px sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.75)";
      ctx.fillText("Toca el campo para colocar (⚡ " + def2.cost + ", ATP: " + state.atp + ")", infoX, infoY + 24);
      if (!isPortrait) {
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        ctx.fillText("ESC cancela", infoX, infoY + 42);
      }
    } else {
      ctx.fillStyle = "rgba(255,255,255,0.55)";
      ctx.font = "13px sans-serif";
      ctx.fillText(isPortrait
        ? "Toca una celula para construir."
        : "Elige una celula inmune o toca una torre.", infoX, infoY + 6);
      if (!isPortrait) {
        ctx.font = "11px sans-serif";
        ctx.fillStyle = "rgba(255,255,255,0.35)";
        ctx.fillText("1/2/3 elegir • ESC cancelar • SPACE oleada • R reiniciar", infoX, infoY + 30);
        ctx.fillText("Patogenos: bacteria lenta+fuerte • virus rapido • hongo medio", infoX, infoY + 48);
      } else {
        ctx.font = "11px sans-serif";
        ctx.fillStyle = "rgba(255,255,255,0.4)";
        ctx.fillText("Toca torre colocada para mejorar/vender.", infoX, infoY + 26);
      }
    }
  }

  function drawGhost() {
    if (!state.selectedToBuild || !state.pointer.isOver) return;
    var x = state.pointer.x, y = state.pointer.y;
    if (y < FIELD_TOP || y >= FIELD_BOTTOM) return;
    var def = TOWER_DEFS[state.selectedToBuild];
    var stats = def.levels[0];
    var ok = canPlaceTowerAt(x, y) && state.atp >= def.cost;
    // Range circle (white dotted on tinted disc)
    ctx.save();
    ctx.fillStyle = ok ? "rgba(255, 255, 255, 0.18)" : "rgba(220, 70, 70, 0.20)";
    ctx.beginPath();
    ctx.arc(x, y, stats.range * U, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = ok ? "rgba(255, 255, 255, 0.85)" : "rgba(220, 70, 70, 0.85)";
    ctx.lineWidth = 2.4;
    ctx.setLineDash([7 * U, 6 * U]);
    ctx.beginPath();
    ctx.arc(x, y, stats.range * U, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
    // Ghost sprite
    ctx.save();
    ctx.globalAlpha = ok ? 0.85 : 0.55;
    var fakeTower = { x: x, y: y, def: def, level: 0, idlePhase: 0, attackAnim: 0, muzzleFlash: 0 };
    if (def.id === "macrofago") drawMacrofago(fakeTower, 1, "idle", false);
    else if (def.id === "linfocitoB") drawLinfocitoB(fakeTower, 1, "idle", false);
    else drawLinfocitoT(fakeTower, 1, "idle", false);
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawWaveBanner() {
    if (state.waveBannerTimer <= 0 || !state.waveBannerText) return;
    var t = state.waveBannerTimer / 1.2;
    var alpha;
    if (t > 0.75) alpha = (1 - t) / 0.25;
    else if (t < 0.20) alpha = t / 0.20;
    else alpha = 1;
    alpha = Math.max(0, Math.min(1, alpha));
    // Subtle dim of the field area only
    ctx.save();
    ctx.fillStyle = "rgba(20, 12, 18, " + (alpha * 0.18) + ")";
    ctx.fillRect(0, FIELD_TOP, VW, FIELD_BOTTOM - FIELD_TOP);
    ctx.globalAlpha = alpha * 0.92;
    var fs = Math.min(VW * 0.10, VH * 0.085, 52);
    ctx.font = "600 " + fs + 'px Georgia, "Times New Roman", serif';
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    var by = FIELD_TOP + (FIELD_BOTTOM - FIELD_TOP) * 0.45;
    ctx.fillStyle = "rgba(0, 0, 0, 0.30)";
    ctx.fillText(state.waveBannerText, VW / 2 + 1, by + 2);
    ctx.fillStyle = "#fffcf0";
    ctx.fillText(state.waveBannerText, VW / 2, by);
    // Thin gold underline
    ctx.strokeStyle = "rgba(245, 215, 110, " + alpha * 0.7 + ")";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(VW / 2 - fs * 1.2, by + fs * 0.55);
    ctx.lineTo(VW / 2 + fs * 1.2, by + fs * 0.55);
    ctx.stroke();
    ctx.restore();
  }

  function drawMessage() {
    if (state.msgTimer > 0 && state.msg) {
      var alpha = Math.min(1, state.msgTimer / 0.4);
      ctx.font = "bold 16px sans-serif";
      var w = ctx.measureText(state.msg).width + 32;
      var x = VW / 2 - w / 2;
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.globalAlpha = alpha * 0.6;
      roundRect(x, FIELD_TOP + 12, w, 36, 8);
      ctx.fill();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = "#fff";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(state.msg, VW / 2, FIELD_TOP + 30);
      ctx.globalAlpha = 1;
    }
  }

  function drawConfirmModal() {
    if (!state.confirmRestart) return;
    ctx.fillStyle = "rgba(0,0,0,0.55)";
    ctx.fillRect(0, 0, VW, VH);
    ctx.fillStyle = "#2a1a22";
    roundRect(UI.modal.x, UI.modal.y, UI.modal.w, UI.modal.h, 12);
    ctx.fill();
    ctx.strokeStyle = "#5a3540";
    ctx.lineWidth = 2;
    roundRect(UI.modal.x, UI.modal.y, UI.modal.w, UI.modal.h, 12);
    ctx.stroke();
    ctx.fillStyle = "#fff";
    ctx.font = "bold 18px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("¿Reiniciar partida?", UI.modal.x + UI.modal.w / 2, UI.modal.y + 44);
    ctx.font = "13px sans-serif";
    ctx.fillStyle = "rgba(255,255,255,0.7)";
    ctx.fillText("Perderas el progreso actual.", UI.modal.x + UI.modal.w / 2, UI.modal.y + 80);
    drawButton(UI.modalYes, "Si, reiniciar", "#7a3a3a", "#552020", true);
    drawButton(UI.modalNo, "Cancelar", "#1f8a4c", "#16632f", true);
  }

  function drawEndOverlay() {
    if (!state.gameOver && !state.victory) return;
    var fade = Math.min(1, state.endRevealTimer / 0.45);
    ctx.save();
    if (state.victory) {
      drawGoldParticles();
      ctx.fillStyle = "rgba(255, 250, 245, " + (0.92 * fade) + ")";
    } else {
      ctx.fillStyle = "rgba(60, 20, 20, " + (0.85 * fade) + ")";
    }
    ctx.fillRect(0, 0, VW, VH);
    ctx.globalAlpha = fade;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    var titleFs = Math.min(VW * 0.085, VH * 0.075, 36);
    ctx.font = '600 ' + titleFs + 'px Georgia, "Times New Roman", serif';
    var title = state.victory ? "INFECCIÓN ERRADICADA" : "INFECCIÓN CRÍTICA";
    ctx.fillStyle = state.victory ? "#2C3E50" : "#C0392B";
    ctx.fillText(title, VW / 2, VH * 0.35);

    var subFs = Math.max(13, Math.min(18, titleFs * 0.45));
    ctx.font = 'italic ' + subFs + 'px Georgia, serif';
    ctx.fillStyle = state.victory ? "#555" : "rgba(255, 235, 230, 0.85)";
    var sub = state.victory
      ? "Tu sistema inmune defendió al organismo."
      : "El organismo ha sido comprometido.";
    ctx.fillText(sub, VW / 2, VH * 0.35 + titleFs * 0.95);

    // Stats list
    var sx = VW / 2;
    var sy = VH * 0.35 + titleFs * 1.65;
    ctx.font = 'bold ' + Math.max(14, 16) + 'px sans-serif';
    var statsColor = state.victory ? "#2C3E50" : "#f5e7e7";
    ctx.fillStyle = statsColor;
    var stats = [
      "Oleadas completadas: " + Math.min(state.waveIdx, WAVES.length) + " / " + WAVES.length,
      "Patogenos eliminados: " + state.kills,
      "ATP final: " + state.atp,
      "Vida restante: " + state.lives + " / 20"
    ];
    var lineH = 24;
    for (var si = 0; si < stats.length; si++) {
      ctx.fillText(stats[si], sx, sy + si * lineH);
    }

    // Single button
    var btn = UI.endRestartBtn;
    if (state.victory) {
      ctx.fillStyle = "#2C3E50";
      roundRect(btn.x, btn.y, btn.w, btn.h, 8);
      ctx.fill();
      ctx.strokeStyle = "#1a2b3a";
      ctx.lineWidth = 1.5;
      roundRect(btn.x, btn.y, btn.w, btn.h, 8);
      ctx.stroke();
      ctx.fillStyle = "#fff";
      ctx.font = 'bold 15px sans-serif';
      ctx.textBaseline = "middle";
      ctx.fillText("Jugar de nuevo", btn.x + btn.w / 2, btn.y + btn.h / 2);
    } else {
      ctx.fillStyle = "#C0392B";
      roundRect(btn.x, btn.y, btn.w, btn.h, 8);
      ctx.fill();
      ctx.strokeStyle = "#7d2419";
      ctx.lineWidth = 1.5;
      roundRect(btn.x, btn.y, btn.w, btn.h, 8);
      ctx.stroke();
      ctx.fillStyle = "#fff";
      ctx.font = 'bold 15px sans-serif';
      ctx.textBaseline = "middle";
      ctx.fillText("Reintentar", btn.x + btn.w / 2, btn.y + btn.h / 2);
    }
    ctx.restore();
  }

  function render() {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    // Shake offset for life loss only (defeat overlay is calm/elegant per spec).
    var shakeOff = { x: 0, y: 0 };
    if (state.shakeTimer > 0 && !state.gameOver && !state.victory) {
      var sm = state.shakeMag || 5;
      var sintensity = Math.min(1, state.shakeTimer / 0.3);
      shakeOff.x = (Math.random() - 0.5) * sm * sintensity;
      shakeOff.y = (Math.random() - 0.5) * sm * sintensity;
    }
    ctx.setTransform(dpr, 0, 0, dpr, shakeOff.x * dpr, shakeOff.y * dpr);

    clearCanvas();
    drawAmbient();
    drawPath();
    drawRangeHint();
    for (var i = 0; i < state.towers.length; i++) drawTower(state.towers[i]);
    for (var j = 0; j < state.enemies.length; j++) drawEnemy(state.enemies[j]);
    for (var k = 0; k < state.projectiles.length; k++) drawProjectile(state.projectiles[k]);
    for (var m = 0; m < state.effects.length; m++) drawEffect(state.effects[m]);
    drawGhost();
    drawDamageNumbers();
    drawHUD();
    drawPanel();
    drawMessage();
    drawWaveBanner();
    if (state.time - state.lastPlaceFailedAt < 0.25) {
      var a = 1 - (state.time - state.lastPlaceFailedAt) / 0.25;
      ctx.strokeStyle = "rgba(220, 70, 70, " + a + ")";
      ctx.lineWidth = 4;
      ctx.strokeRect(2, FIELD_TOP + 2, VW - 4, FIELD_H - 4);
    }
    drawEndOverlay();
    drawConfirmModal();
  }

  function drawDamageNumbers() {
    if (!state.damageNumbers.length) return;
    for (var i = 0; i < state.damageNumbers.length; i++) {
      var d = state.damageNumbers[i];
      var alpha = Math.max(0, d.life / d.max);
      var fs = Math.max(14, 16 * U);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.font = "bold " + fs + "px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.lineWidth = 4;
      ctx.strokeStyle = "rgba(0, 0, 0, 0.85)";
      ctx.strokeText(d.text, d.x, d.y);
      ctx.fillStyle = d.color;
      ctx.fillText(d.text, d.x, d.y);
      ctx.restore();
    }
  }

  function drawRangeHint() {
    if (!state.rangeHint) return;
    var rh = state.rangeHint;
    ctx.save();
    ctx.fillStyle = "rgba(255, 255, 255, 0.18)";
    ctx.beginPath();
    ctx.arc(rh.x, rh.y, rh.range, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "rgba(255, 255, 255, 0.50)";
    ctx.lineWidth = 2.4;
    ctx.setLineDash([8, 4]);
    ctx.beginPath();
    ctx.arc(rh.x, rh.y, rh.range, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    // Subtle inner colored hairline so it's tinted by the source.
    ctx.strokeStyle = "rgba(40, 40, 50, 0.35)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(rh.x, rh.y, rh.range, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  function drawGoldParticles() {
    if (!state.goldParticles.length) return;
    for (var i = 0; i < state.goldParticles.length; i++) {
      var p = state.goldParticles[i];
      var alpha = Math.max(0, Math.min(1, p.life / 1.5)) * p.alpha;
      ctx.fillStyle = "rgba(245, 215, 110, " + alpha + ")";
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // -------- LOOP ----------------------------------------------------------
  var lastT = performance.now();
  function loop(now) {
    var dt = Math.min(0.05, (now - lastT) / 1000);
    lastT = now;
    state.time += dt;
    if (!state.gameOver && !state.victory && !state.confirmRestart) {
      updateWave(dt);
      updateEnemies(dt);
      updateTowers(dt);
      updateProjectiles(dt);
    }
    updateEffects(dt);
    if (state.msgTimer > 0) state.msgTimer -= dt;
    render();
    requestAnimationFrame(loop);
  }

  window.addEventListener("resize", resize);
  window.addEventListener("orientationchange", resize);
  resize();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
