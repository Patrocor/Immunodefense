<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a0e12">
<title>ImmunoDefense</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1a0e12;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
    color: #fff;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    overscroll-behavior: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #canvas {
    display: block;
    background: #f8e8e0;
    border-radius: 6px;
    box-shadow: 0 6px 28px rgba(0,0,0,0.5);
    touch-action: none;
  }
</style>
</head>
<body>
<canvas id="canvas" width="800" height="600"></canvas>
<script>
(function () {
  "use strict";

  var canvas = document.getElementById("canvas");
  var ctx = canvas.getContext("2d");
  var W = 800, H = 600;
  var FIELD_TOP = 56;
  var FIELD_BOTTOM = 480;
  var PANEL_TOP = 484;

  // -------- PATH ----------------------------------------------------------
  var PATH_POINTS = [
    { x: -20, y: 140 },
    { x: 180, y: 140 },
    { x: 180, y: 290 },
    { x: 480, y: 290 },
    { x: 480, y: 410 },
    { x: 820, y: 410 }
  ];

  function buildPath(points) {
    var segs = [];
    var total = 0;
    for (var i = 0; i < points.length - 1; i++) {
      var a = points[i], b = points[i + 1];
      var len = Math.hypot(b.x - a.x, b.y - a.y);
      segs.push({ a: a, b: b, len: len, start: total });
      total += len;
    }
    return { points: points, segs: segs, total: total };
  }
  var PATH = buildPath(PATH_POINTS);

  function pathPos(progress) {
    if (progress <= 0) return { x: PATH_POINTS[0].x, y: PATH_POINTS[0].y };
    if (progress >= PATH.total) {
      var last = PATH_POINTS[PATH_POINTS.length - 1];
      return { x: last.x, y: last.y };
    }
    for (var i = 0; i < PATH.segs.length; i++) {
      var s = PATH.segs[i];
      if (progress < s.start + s.len) {
        var t = (progress - s.start) / s.len;
        return { x: s.a.x + (s.b.x - s.a.x) * t, y: s.a.y + (s.b.y - s.a.y) * t };
      }
    }
    var l = PATH_POINTS[PATH_POINTS.length - 1];
    return { x: l.x, y: l.y };
  }

  function distPointToSegment(px, py, ax, ay, bx, by) {
    var dx = bx - ax, dy = by - ay;
    var len2 = dx * dx + dy * dy;
    if (len2 === 0) return Math.hypot(px - ax, py - ay);
    var t = ((px - ax) * dx + (py - ay) * dy) / len2;
    if (t < 0) t = 0; else if (t > 1) t = 1;
    return Math.hypot(px - (ax + t * dx), py - (ay + t * dy));
  }

  function distPointToPath(x, y) {
    var best = Infinity;
    for (var i = 0; i < PATH.segs.length; i++) {
      var s = PATH.segs[i];
      var d = distPointToSegment(x, y, s.a.x, s.a.y, s.b.x, s.b.y);
      if (d < best) best = d;
    }
    return best;
  }

  // -------- DEFINITIONS ---------------------------------------------------
  var TOWER_DEFS = {
    macrofago: {
      id: "macrofago",
      name: "Macrofago",
      shortName: "Macro",
      color: "#2c7be5",
      colorDark: "#1a4f99",
      cost: 50,
      desc: "Cuerpo a cuerpo",
      levels: [
        { range: 80,  damage: 18, fireRate: 1.2, projectileSpeed: 0,   splash: 0 },
        { range: 90,  damage: 32, fireRate: 1.4, projectileSpeed: 0,   splash: 0 },
        { range: 100, damage: 55, fireRate: 1.6, projectileSpeed: 0,   splash: 0 }
      ],
      upgradeCost: [60, 110]
    },
    linfocitoB: {
      id: "linfocitoB",
      name: "Linfocito B",
      shortName: "Linf-B",
      color: "#11a07f",
      colorDark: "#0a6655",
      cost: 75,
      desc: "Anticuerpos a distancia",
      levels: [
        { range: 180, damage: 10, fireRate: 1.8, projectileSpeed: 360, splash: 0 },
        { range: 210, damage: 17, fireRate: 2.2, projectileSpeed: 410, splash: 0 },
        { range: 240, damage: 28, fireRate: 2.6, projectileSpeed: 460, splash: 0 }
      ],
      upgradeCost: [85, 140]
    },
    linfocitoT: {
      id: "linfocitoT",
      name: "Linfocito T",
      shortName: "Linf-T",
      color: "#7c3fcc",
      colorDark: "#4d2080",
      cost: 110,
      desc: "Citotoxico (area)",
      levels: [
        { range: 120, damage: 22, fireRate: 0.8, projectileSpeed: 300, splash: 50 },
        { range: 140, damage: 38, fireRate: 0.95, projectileSpeed: 340, splash: 65 },
        { range: 160, damage: 62, fireRate: 1.1, projectileSpeed: 380, splash: 80 }
      ],
      upgradeCost: [120, 200]
    }
  };

  var TOWER_LIST = ["macrofago", "linfocitoB", "linfocitoT"];

  var ENEMY_DEFS = {
    bacteria: { id: "bacteria", name: "Bacteria", color: "#c54040", colorDark: "#7a1f1f", radius: 14, speed: 30, hp: 60, reward: 10 },
    virus:    { id: "virus",    name: "Virus",    color: "#7d2bb3", colorDark: "#4a1670", radius: 9,  speed: 70, hp: 18, reward: 7  },
    hongo:    { id: "hongo",    name: "Hongo",    color: "#a02b6e", colorDark: "#5e1a40", radius: 12, speed: 44, hp: 38, reward: 12 }
  };

  // Wave list (8 waves, increasing difficulty)
  var WAVES = [
    { groups: [{ type: "bacteria", count: 6, interval: 0.9 }], hpMult: 1.0, speedMult: 1.0 },
    { groups: [{ type: "bacteria", count: 4, interval: 0.8 }, { type: "virus", count: 4, interval: 0.45 }], hpMult: 1.0, speedMult: 1.0 },
    { groups: [{ type: "virus", count: 10, interval: 0.4 }], hpMult: 1.05, speedMult: 1.05 },
    { groups: [{ type: "bacteria", count: 6, interval: 0.7 }, { type: "hongo", count: 4, interval: 0.7 }], hpMult: 1.1, speedMult: 1.05 },
    { groups: [{ type: "hongo", count: 8, interval: 0.55 }, { type: "virus", count: 6, interval: 0.4 }], hpMult: 1.15, speedMult: 1.1 },
    { groups: [{ type: "bacteria", count: 8, interval: 0.6 }, { type: "virus", count: 8, interval: 0.35 }], hpMult: 1.2, speedMult: 1.1 },
    { groups: [{ type: "hongo", count: 10, interval: 0.5 }, { type: "bacteria", count: 6, interval: 0.7 }], hpMult: 1.3, speedMult: 1.15 },
    { groups: [{ type: "virus", count: 12, interval: 0.32 }, { type: "hongo", count: 8, interval: 0.55 }, { type: "bacteria", count: 6, interval: 0.8 }], hpMult: 1.45, speedMult: 1.2 }
  ];

  // -------- STATE ---------------------------------------------------------
  var state;

  function newState() {
    return {
      atp: 150,
      lives: 10,
      waveIdx: 0,         // number of started waves
      waveActive: false,
      pendingSpawns: [],
      spawnElapsed: 0,
      towers: [],
      enemies: [],
      projectiles: [],
      effects: [],         // hits, explosions, melee flashes
      selectedToBuild: null,
      selectedTower: null,
      pointer: { x: 0, y: 0, inField: false, isOver: false },
      lastPlaceFailedAt: 0,
      msg: "",
      msgTimer: 0,
      gameOver: false,
      victory: false,
      time: 0
    };
  }

  state = newState();

  // -------- SPAWNING / WAVES ----------------------------------------------
  function startNextWave() {
    if (state.waveActive || state.gameOver || state.victory) return;
    if (state.waveIdx >= WAVES.length) return;
    var wave = WAVES[state.waveIdx];
    state.waveIdx += 1;
    state.waveActive = true;
    state.spawnElapsed = 0;
    state.pendingSpawns = [];
    var t = 0;
    for (var i = 0; i < wave.groups.length; i++) {
      var g = wave.groups[i];
      for (var k = 0; k < g.count; k++) {
        state.pendingSpawns.push({ type: g.type, time: t, hpMult: wave.hpMult, speedMult: wave.speedMult });
        t += g.interval;
      }
      t += 0.6;
    }
    showMsg("Oleada " + state.waveIdx + " iniciada");
  }

  function spawnEnemy(typeId, hpMult, speedMult) {
    var def = ENEMY_DEFS[typeId];
    state.enemies.push({
      def: def,
      hp: def.hp * hpMult,
      maxHp: def.hp * hpMult,
      speed: def.speed * speedMult,
      progress: 0,
      x: PATH_POINTS[0].x,
      y: PATH_POINTS[0].y,
      wobble: Math.random() * Math.PI * 2,
      dead: false
    });
  }

  function updateWave(dt) {
    if (!state.waveActive) return;
    state.spawnElapsed += dt;
    while (state.pendingSpawns.length && state.pendingSpawns[0].time <= state.spawnElapsed) {
      var s = state.pendingSpawns.shift();
      spawnEnemy(s.type, s.hpMult, s.speedMult);
    }
    if (!state.pendingSpawns.length && !state.enemies.length) {
      state.waveActive = false;
      state.atp += 25 + state.waveIdx * 5;
      if (state.waveIdx >= WAVES.length) {
        state.victory = true;
        showMsg("VICTORIA");
      } else {
        showMsg("Oleada superada (+" + (25 + state.waveIdx * 5) + " ATP)");
      }
    }
  }

  // -------- ENEMY UPDATE --------------------------------------------------
  function updateEnemies(dt) {
    for (var i = 0; i < state.enemies.length; i++) {
      var e = state.enemies[i];
      if (e.dead) continue;
      e.progress += e.speed * dt;
      e.wobble += dt * 6;
      if (e.progress >= PATH.total) {
        e.dead = true;
        state.lives -= 1;
        spawnEffect("escape", e.x, e.y);
        if (state.lives <= 0) {
          state.lives = 0;
          state.gameOver = true;
          showMsg("DERROTA");
        }
      } else {
        var p = pathPos(e.progress);
        e.x = p.x;
        e.y = p.y;
      }
    }
    state.enemies = state.enemies.filter(function (e) { return !e.dead; });
  }

  // -------- TOWER UPDATE --------------------------------------------------
  function placeTower(x, y, typeId) {
    var def = TOWER_DEFS[typeId];
    state.towers.push({
      x: x, y: y,
      def: def,
      level: 0,
      cooldown: 0,
      muzzleFlash: 0
    });
  }

  function towerStats(t) { return t.def.levels[t.level]; }

  function updateTowers(dt) {
    for (var i = 0; i < state.towers.length; i++) {
      var t = state.towers[i];
      if (t.cooldown > 0) t.cooldown -= dt;
      if (t.muzzleFlash > 0) t.muzzleFlash -= dt;
      if (t.cooldown > 0) continue;
      var stats = towerStats(t);
      var target = null, bestProgress = -1;
      for (var j = 0; j < state.enemies.length; j++) {
        var e = state.enemies[j];
        if (e.dead) continue;
        var d = Math.hypot(e.x - t.x, e.y - t.y);
        if (d <= stats.range && e.progress > bestProgress) {
          bestProgress = e.progress;
          target = e;
        }
      }
      if (target) {
        fireTower(t, target);
        t.cooldown = 1 / stats.fireRate;
        t.muzzleFlash = 0.08;
      }
    }
  }

  function fireTower(t, target) {
    var stats = towerStats(t);
    if (stats.projectileSpeed === 0) {
      // Melee instant hit (Macrofago)
      damageEnemy(target, stats.damage);
      state.effects.push({ kind: "melee", x1: t.x, y1: t.y, x2: target.x, y2: target.y, life: 0.18, max: 0.18, color: t.def.color });
    } else {
      state.projectiles.push({
        x: t.x, y: t.y,
        target: target,
        damage: stats.damage,
        speed: stats.projectileSpeed,
        splash: stats.splash,
        color: t.def.color,
        dead: false
      });
    }
  }

  function damageEnemy(e, amount) {
    if (e.dead) return;
    e.hp -= amount;
    if (e.hp <= 0) {
      e.dead = true;
      state.atp += e.def.reward;
      spawnEffect("death", e.x, e.y, e.def.color);
    }
  }

  // -------- PROJECTILES ---------------------------------------------------
  function updateProjectiles(dt) {
    for (var i = 0; i < state.projectiles.length; i++) {
      var p = state.projectiles[i];
      if (p.dead) continue;
      if (!p.target || p.target.dead) {
        p.dead = true;
        continue;
      }
      var dx = p.target.x - p.x, dy = p.target.y - p.y;
      var d = Math.hypot(dx, dy);
      var step = p.speed * dt;
      if (d <= step + 4) {
        if (p.splash > 0) {
          for (var j = 0; j < state.enemies.length; j++) {
            var e = state.enemies[j];
            if (e.dead) continue;
            if (Math.hypot(e.x - p.target.x, e.y - p.target.y) <= p.splash) {
              damageEnemy(e, p.damage);
            }
          }
          state.effects.push({ kind: "explosion", x: p.target.x, y: p.target.y, r: 0, max: p.splash, life: 0.4, color: p.color });
        } else {
          damageEnemy(p.target, p.damage);
          state.effects.push({ kind: "hit", x: p.target.x, y: p.target.y, life: 0.2, max: 0.2, color: p.color });
        }
        p.dead = true;
      } else {
        p.x += (dx / d) * step;
        p.y += (dy / d) * step;
      }
    }
    state.projectiles = state.projectiles.filter(function (p) { return !p.dead; });
  }

  // -------- EFFECTS -------------------------------------------------------
  function spawnEffect(kind, x, y, color) {
    if (kind === "death") {
      for (var i = 0; i < 6; i++) {
        var ang = Math.random() * Math.PI * 2;
        var spd = 40 + Math.random() * 60;
        state.effects.push({
          kind: "particle",
          x: x, y: y,
          vx: Math.cos(ang) * spd,
          vy: Math.sin(ang) * spd,
          life: 0.4 + Math.random() * 0.2,
          max: 0.6,
          color: color || "#fff"
        });
      }
    } else if (kind === "escape") {
      state.effects.push({ kind: "escape", x: x, y: y, life: 0.6, max: 0.6 });
    }
  }

  function updateEffects(dt) {
    for (var i = 0; i < state.effects.length; i++) {
      var ef = state.effects[i];
      ef.life -= dt;
      if (ef.kind === "particle") {
        ef.x += ef.vx * dt;
        ef.y += ef.vy * dt;
        ef.vx *= 0.92;
        ef.vy *= 0.92;
      } else if (ef.kind === "explosion") {
        ef.r = ef.max * (1 - ef.life / 0.4);
      }
    }
    state.effects = state.effects.filter(function (e) { return e.life > 0; });
  }

  // -------- INPUT ---------------------------------------------------------
  function canvasPosFromEvent(evt) {
    var rect = canvas.getBoundingClientRect();
    var clientX = evt.clientX, clientY = evt.clientY;
    if (clientX === undefined && evt.touches && evt.touches[0]) {
      clientX = evt.touches[0].clientX;
      clientY = evt.touches[0].clientY;
    }
    var x = (clientX - rect.left) * (canvas.width / rect.width);
    var y = (clientY - rect.top) * (canvas.height / rect.height);
    return { x: x, y: y };
  }

  function inRect(x, y, r) {
    return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
  }

  // UI rectangles (recomputed each frame so we don't drift)
  var UI = {
    nextWaveBtn: { x: 605, y: 10, w: 180, h: 36 },
    cards: [
      { x: 10,  y: 492, w: 100, h: 100 },
      { x: 120, y: 492, w: 100, h: 100 },
      { x: 230, y: 492, w: 100, h: 100 }
    ],
    upgradeBtn: { x: 600, y: 538, w: 180, h: 50 },
    sellBtn:    { x: 600, y: 492, w: 180, h: 38 },
    deselectBtn:{ x: 350, y: 492, w: 100, h: 28 },
    restartBtn: { x: 320, y: 360, w: 160, h: 50 }
  };

  function handleClick(x, y) {
    if (state.gameOver || state.victory) {
      if (inRect(x, y, UI.restartBtn)) {
        state = newState();
      }
      return;
    }

    // Top HUD button
    if (inRect(x, y, UI.nextWaveBtn) && !state.waveActive && state.waveIdx < WAVES.length) {
      startNextWave();
      return;
    }

    // Bottom panel
    if (y >= PANEL_TOP) {
      // Tower cards
      for (var i = 0; i < UI.cards.length; i++) {
        if (inRect(x, y, UI.cards[i])) {
          var typeId = TOWER_LIST[i];
          if (state.atp >= TOWER_DEFS[typeId].cost) {
            state.selectedToBuild = state.selectedToBuild === typeId ? null : typeId;
            state.selectedTower = null;
          } else {
            flashFail();
          }
          return;
        }
      }
      // Selected tower controls
      if (state.selectedTower) {
        if (inRect(x, y, UI.deselectBtn)) {
          state.selectedTower = null;
          return;
        }
        if (inRect(x, y, UI.sellBtn)) {
          sellTower(state.selectedTower);
          return;
        }
        if (state.selectedTower.level < 2 && inRect(x, y, UI.upgradeBtn)) {
          tryUpgrade(state.selectedTower);
          return;
        }
      }
      return;
    }

    // Field click
    if (y < FIELD_TOP) return;

    if (state.selectedToBuild) {
      if (canPlaceTowerAt(x, y)) {
        var def = TOWER_DEFS[state.selectedToBuild];
        if (state.atp >= def.cost) {
          state.atp -= def.cost;
          placeTower(x, y, state.selectedToBuild);
          if (state.atp < def.cost) state.selectedToBuild = null;
        }
      } else {
        flashFail();
      }
      return;
    }

    // No build selected: try select an existing tower
    var picked = null;
    for (var t = 0; t < state.towers.length; t++) {
      var tw = state.towers[t];
      if (Math.hypot(tw.x - x, tw.y - y) <= 22) { picked = tw; break; }
    }
    state.selectedTower = picked;
  }

  function canPlaceTowerAt(x, y) {
    if (y < FIELD_TOP + 24 || y > FIELD_BOTTOM - 24) return false;
    if (x < 24 || x > W - 24) return false;
    if (distPointToPath(x, y) < 28) return false;
    for (var i = 0; i < state.towers.length; i++) {
      if (Math.hypot(state.towers[i].x - x, state.towers[i].y - y) < 38) return false;
    }
    return true;
  }

  function tryUpgrade(t) {
    if (t.level >= 2) return;
    var cost = t.def.upgradeCost[t.level];
    if (state.atp < cost) { flashFail(); return; }
    state.atp -= cost;
    t.level += 1;
    showMsg(t.def.name + " mejorado a nivel " + (t.level + 1));
  }

  function sellTower(t) {
    var refund = Math.floor(t.def.cost * 0.6);
    for (var i = 0; i <= t.level - 1; i++) refund += Math.floor(t.def.upgradeCost[i] * 0.5);
    state.atp += refund;
    state.towers = state.towers.filter(function (x) { return x !== t; });
    state.selectedTower = null;
    showMsg("Vendido (+" + refund + " ATP)");
  }

  function flashFail() {
    state.lastPlaceFailedAt = state.time;
  }

  function showMsg(text) {
    state.msg = text;
    state.msgTimer = 1.6;
  }

  function onPointerDown(evt) {
    evt.preventDefault();
    var p = canvasPosFromEvent(evt);
    state.pointer.x = p.x;
    state.pointer.y = p.y;
    state.pointer.isOver = true;
    state.pointer.inField = p.y >= FIELD_TOP && p.y < PANEL_TOP;
    handleClick(p.x, p.y);
  }
  function onPointerMove(evt) {
    var p = canvasPosFromEvent(evt);
    state.pointer.x = p.x;
    state.pointer.y = p.y;
    state.pointer.isOver = true;
    state.pointer.inField = p.y >= FIELD_TOP && p.y < PANEL_TOP;
  }
  function onPointerLeave() {
    state.pointer.isOver = false;
  }

  canvas.addEventListener("pointerdown", onPointerDown);
  canvas.addEventListener("pointermove", onPointerMove);
  canvas.addEventListener("pointerleave", onPointerLeave);
  canvas.addEventListener("contextmenu", function (e) { e.preventDefault(); });
  document.addEventListener("keydown", function (e) {
    if (e.key === " " || e.code === "Space") {
      e.preventDefault();
      if (!state.waveActive && !state.gameOver && !state.victory) startNextWave();
    } else if (e.key === "Escape") {
      state.selectedToBuild = null;
      state.selectedTower = null;
    } else if (e.key === "1") {
      state.selectedToBuild = "macrofago"; state.selectedTower = null;
    } else if (e.key === "2") {
      state.selectedToBuild = "linfocitoB"; state.selectedTower = null;
    } else if (e.key === "3") {
      state.selectedToBuild = "linfocitoT"; state.selectedTower = null;
    }
  });

  // -------- RENDER --------------------------------------------------------
  function clearCanvas() {
    ctx.fillStyle = "#f8e8e0";
    ctx.fillRect(0, 0, W, H);

    // Subtle tissue speckles
    ctx.fillStyle = "rgba(200, 140, 130, 0.18)";
    var seed = 13;
    for (var i = 0; i < 80; i++) {
      seed = (seed * 9301 + 49297) % 233280;
      var x = (seed / 233280) * W;
      seed = (seed * 9301 + 49297) % 233280;
      var y = FIELD_TOP + (seed / 233280) * (FIELD_BOTTOM - FIELD_TOP);
      seed = (seed * 9301 + 49297) % 233280;
      var r = 1 + (seed / 233280) * 3;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawPath() {
    // Outer glow
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = "#e8b8b0";
    ctx.lineWidth = 38;
    strokePath();
    ctx.strokeStyle = "#d8978b";
    ctx.lineWidth = 30;
    strokePath();
    ctx.strokeStyle = "#c47a6e";
    ctx.lineWidth = 22;
    strokePath();
    // Center stripe
    ctx.strokeStyle = "rgba(255,255,255,0.18)";
    ctx.lineWidth = 4;
    ctx.setLineDash([10, 14]);
    strokePath();
    ctx.setLineDash([]);

    // Entry / exit markers
    var entry = PATH_POINTS[1];
    var exitP = PATH_POINTS[PATH_POINTS.length - 2];
    drawLabelMarker(20, 140, "Herida", "#7a1f1f");
    drawLabelMarker(W - 20, 410, "Vaso", "#3b1d6b");
  }

  function strokePath() {
    ctx.beginPath();
    ctx.moveTo(PATH_POINTS[0].x, PATH_POINTS[0].y);
    for (var i = 1; i < PATH_POINTS.length; i++) {
      ctx.lineTo(PATH_POINTS[i].x, PATH_POINTS[i].y);
    }
    ctx.stroke();
  }

  function drawLabelMarker(x, y, text, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, 9, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.font = "11px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "top";
    ctx.fillText(text, x, y + 14);
  }

  function drawHexagon(cx, cy, r, fill, stroke, strokeW) {
    ctx.beginPath();
    for (var i = 0; i < 6; i++) {
      var a = Math.PI / 3 * i - Math.PI / 2;
      var x = cx + Math.cos(a) * r;
      var y = cy + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    if (fill) { ctx.fillStyle = fill; ctx.fill(); }
    if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = strokeW || 2; ctx.stroke(); }
  }

  function drawTower(t) {
    var stats = towerStats(t);
    if (state.selectedTower === t) {
      ctx.fillStyle = "rgba(50, 60, 90, 0.10)";
      ctx.strokeStyle = "rgba(60, 80, 130, 0.45)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(t.x, t.y, stats.range, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    }
    if (t.muzzleFlash > 0) {
      ctx.fillStyle = "rgba(255, 240, 180, 0.55)";
      ctx.beginPath();
      ctx.arc(t.x, t.y, 26, 0, Math.PI * 2);
      ctx.fill();
    }
    drawHexagon(t.x, t.y, 20, t.def.color, t.def.colorDark, 2);
    drawHexagon(t.x, t.y, 11, "#ffffff", null);
    // Level pips
    ctx.fillStyle = t.def.colorDark;
    for (var i = 0; i <= t.level; i++) {
      ctx.beginPath();
      ctx.arc(t.x - 6 + i * 6, t.y - 1, 2.2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawEnemy(e) {
    var def = e.def;
    var wob = Math.sin(e.wobble) * 1.5;
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.fillStyle = def.colorDark;
    ctx.beginPath();
    ctx.arc(2, 2, def.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = def.color;
    ctx.beginPath();
    ctx.arc(0, 0 + wob * 0.2, def.radius, 0, Math.PI * 2);
    ctx.fill();
    if (def.id === "virus") {
      ctx.strokeStyle = def.colorDark;
      ctx.lineWidth = 2;
      for (var i = 0; i < 6; i++) {
        var a = i * Math.PI / 3 + e.wobble * 0.3;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * def.radius, Math.sin(a) * def.radius);
        ctx.lineTo(Math.cos(a) * (def.radius + 4), Math.sin(a) * (def.radius + 4));
        ctx.stroke();
      }
    } else if (def.id === "hongo") {
      ctx.fillStyle = "rgba(255,255,255,0.4)";
      ctx.beginPath();
      ctx.arc(-3, -3, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(4, 1, 2, 0, Math.PI * 2);
      ctx.fill();
    } else if (def.id === "bacteria") {
      ctx.fillStyle = def.colorDark;
      ctx.beginPath();
      ctx.arc(-3, -2, 2.5, 0, Math.PI * 2);
      ctx.arc(3, 2, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    // HP bar
    var hpRatio = Math.max(0, e.hp / e.maxHp);
    var bw = Math.max(20, def.radius * 2);
    var bh = 4;
    ctx.fillStyle = "rgba(0,0,0,0.55)";
    ctx.fillRect(e.x - bw / 2, e.y - def.radius - 9, bw, bh);
    ctx.fillStyle = hpRatio > 0.5 ? "#5cb85c" : hpRatio > 0.25 ? "#f0ad4e" : "#d9534f";
    ctx.fillRect(e.x - bw / 2, e.y - def.radius - 9, bw * hpRatio, bh);
  }

  function drawProjectile(p) {
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.splash > 0 ? 6 : 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,0.35)";
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  function drawEffect(ef) {
    var alpha = Math.max(0, ef.life / ef.max);
    if (ef.kind === "particle") {
      ctx.fillStyle = ef.color;
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(ef.x, ef.y, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if (ef.kind === "hit") {
      ctx.strokeStyle = ef.color;
      ctx.globalAlpha = alpha;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(ef.x, ef.y, 8 + (1 - alpha) * 10, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    } else if (ef.kind === "explosion") {
      ctx.fillStyle = ef.color;
      ctx.globalAlpha = alpha * 0.4;
      ctx.beginPath();
      ctx.arc(ef.x, ef.y, ef.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = ef.color;
      ctx.globalAlpha = alpha;
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.globalAlpha = 1;
    } else if (ef.kind === "melee") {
      ctx.strokeStyle = ef.color;
      ctx.globalAlpha = alpha;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(ef.x1, ef.y1);
      ctx.lineTo(ef.x2, ef.y2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    } else if (ef.kind === "escape") {
      ctx.strokeStyle = "#d9534f";
      ctx.globalAlpha = alpha;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(ef.x, ef.y, 12 + (1 - alpha) * 18, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  function drawHUD() {
    ctx.fillStyle = "#3a2530";
    ctx.fillRect(0, 0, W, FIELD_TOP);
    ctx.fillStyle = "rgba(255,255,255,0.06)";
    ctx.fillRect(0, FIELD_TOP - 2, W, 2);

    ctx.font = "bold 18px sans-serif";
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";

    drawHudStat("⚡ ATP", state.atp, 16, "#f5d76e");
    drawHudStat("♥ Vida", state.lives, 180, state.lives <= 3 ? "#ff7878" : "#9adfb1");
    drawHudStat("⌖ Oleada", state.waveIdx + " / " + WAVES.length, 360, "#e0e0e0");

    // Next wave button
    if (!state.waveActive && state.waveIdx < WAVES.length) {
      drawButton(UI.nextWaveBtn, "▶ Iniciar Oleada", "#1f8a4c", "#16632f", true);
    } else if (state.waveActive) {
      drawButton(UI.nextWaveBtn, "Oleada en curso...", "#5a4250", "#3a2530", false);
    } else {
      drawButton(UI.nextWaveBtn, "Sin mas oleadas", "#5a4250", "#3a2530", false);
    }
  }

  function drawHudStat(label, value, x, color) {
    ctx.fillStyle = "rgba(255,255,255,0.55)";
    ctx.font = "11px sans-serif";
    ctx.fillText(label, x, 14);
    ctx.fillStyle = color;
    ctx.font = "bold 18px sans-serif";
    ctx.fillText(value, x, 34);
  }

  function drawButton(r, text, fill, stroke, enabled) {
    ctx.fillStyle = fill;
    roundRect(r.x, r.y, r.w, r.h, 8);
    ctx.fill();
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 1.5;
    roundRect(r.x, r.y, r.w, r.h, 8);
    ctx.stroke();
    ctx.fillStyle = enabled ? "#fff" : "rgba(255,255,255,0.55)";
    ctx.font = "bold 14px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(text, r.x + r.w / 2, r.y + r.h / 2);
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h - r);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function drawPanel() {
    ctx.fillStyle = "#2a1a22";
    ctx.fillRect(0, PANEL_TOP, W, H - PANEL_TOP);

    // Tower cards
    for (var i = 0; i < TOWER_LIST.length; i++) {
      var typeId = TOWER_LIST[i];
      var def = TOWER_DEFS[typeId];
      var card = UI.cards[i];
      var canAfford = state.atp >= def.cost;
      var isSelected = state.selectedToBuild === typeId;

      ctx.fillStyle = isSelected ? "#3a2538" : "#1f1219";
      roundRect(card.x, card.y, card.w, card.h, 8);
      ctx.fill();
      ctx.strokeStyle = isSelected ? def.color : "rgba(255,255,255,0.08)";
      ctx.lineWidth = isSelected ? 3 : 1.5;
      roundRect(card.x, card.y, card.w, card.h, 8);
      ctx.stroke();

      // Icon
      drawHexagon(card.x + card.w / 2, card.y + 28, 16, canAfford ? def.color : "#555", def.colorDark, 2);
      drawHexagon(card.x + card.w / 2, card.y + 28, 8, "#fff", null);

      // Name + cost
      ctx.fillStyle = canAfford ? "#fff" : "rgba(255,255,255,0.45)";
      ctx.font = "bold 12px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      ctx.fillText(def.name, card.x + card.w / 2, card.y + 52);

      ctx.font = "10px sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.55)";
      ctx.fillText(def.desc, card.x + card.w / 2, card.y + 68);

      ctx.font = "bold 12px sans-serif";
      ctx.fillStyle = canAfford ? "#f5d76e" : "#d9534f";
      ctx.fillText("⚡ " + def.cost, card.x + card.w / 2, card.y + 82);
    }

    // Selected tower info
    var infoX = 350, infoY = PANEL_TOP + 8;
    ctx.textAlign = "left";
    ctx.textBaseline = "top";
    if (state.selectedTower) {
      var t = state.selectedTower;
      var stats = towerStats(t);
      ctx.fillStyle = t.def.color;
      ctx.font = "bold 16px sans-serif";
      ctx.fillText(t.def.name + "  Nv " + (t.level + 1) + "/3", infoX, infoY);

      ctx.font = "12px sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.85)";
      ctx.fillText("Daño: " + stats.damage + (stats.splash > 0 ? "  AOE: " + stats.splash : ""), infoX, infoY + 22);
      ctx.fillText("Rango: " + stats.range + "    Cadencia: " + stats.fireRate.toFixed(2) + "/s", infoX, infoY + 38);

      // Deselect (X) small button at top-right of info zone
      ctx.fillStyle = "rgba(255,255,255,0.1)";
      roundRect(UI.deselectBtn.x, UI.deselectBtn.y, UI.deselectBtn.w, UI.deselectBtn.h, 6);
      ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,0.7)";
      ctx.font = "bold 12px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("Deseleccionar", UI.deselectBtn.x + UI.deselectBtn.w / 2, UI.deselectBtn.y + 8);
      ctx.textAlign = "left";

      // Sell button
      var sellRefund = Math.floor(t.def.cost * 0.6);
      for (var li = 0; li < t.level; li++) sellRefund += Math.floor(t.def.upgradeCost[li] * 0.5);
      drawButton(UI.sellBtn, "Vender (+" + sellRefund + " ATP)", "#7a3a3a", "#552020", true);

      // Upgrade button
      if (t.level < 2) {
        var ucost = t.def.upgradeCost[t.level];
        var canUp = state.atp >= ucost;
        drawButton(UI.upgradeBtn,
          "Mejorar a Nv " + (t.level + 2) + "  (⚡ " + ucost + ")",
          canUp ? "#1f8a4c" : "#3a2530",
          canUp ? "#16632f" : "#22141c",
          canUp);
      } else {
        drawButton(UI.upgradeBtn, "Nivel maximo", "#5a4250", "#3a2530", false);
      }
    } else if (state.selectedToBuild) {
      var def2 = TOWER_DEFS[state.selectedToBuild];
      ctx.fillStyle = def2.color;
      ctx.font = "bold 16px sans-serif";
      ctx.fillText("Construyendo: " + def2.name, infoX, infoY);
      ctx.font = "12px sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.7)";
      ctx.fillText("Click en el campo para colocar (⚡ " + def2.cost + ")", infoX, infoY + 24);
      ctx.fillText("ESC para cancelar  •  ATP restante: " + state.atp, infoX, infoY + 40);
    } else {
      ctx.fillStyle = "rgba(255,255,255,0.5)";
      ctx.font = "13px sans-serif";
      ctx.fillText("Selecciona una celula inmune o toca una torre existente.", infoX, infoY + 6);
      ctx.font = "11px sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.35)";
      ctx.fillText("Atajos: 1/2/3 elegir torre  •  ESC cancelar  •  SPACE iniciar oleada", infoX, infoY + 28);
      ctx.fillText("Patogenos: bacteria (rojo, lento+fuerte) • virus (purpura, rapido) • hongo (rosa, medio)", infoX, infoY + 46);
    }
  }

  function drawGhost() {
    if (!state.selectedToBuild) return;
    if (!state.pointer.isOver) return;
    var x = state.pointer.x, y = state.pointer.y;
    if (y < FIELD_TOP || y >= PANEL_TOP) return;
    var def = TOWER_DEFS[state.selectedToBuild];
    var stats = def.levels[0];
    var ok = canPlaceTowerAt(x, y) && state.atp >= def.cost;
    ctx.fillStyle = ok ? "rgba(50, 200, 120, 0.15)" : "rgba(220, 70, 70, 0.18)";
    ctx.strokeStyle = ok ? "rgba(50, 200, 120, 0.65)" : "rgba(220, 70, 70, 0.7)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y, stats.range, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.globalAlpha = ok ? 0.85 : 0.5;
    drawHexagon(x, y, 20, def.color, def.colorDark, 2);
    ctx.globalAlpha = 1;
  }

  function drawMessage() {
    if (state.msgTimer > 0 && state.msg) {
      var alpha = Math.min(1, state.msgTimer / 0.4);
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.globalAlpha = alpha * 0.6;
      var w = ctx.measureText(state.msg).width + 32;
      var x = W / 2 - w / 2;
      roundRect(x, FIELD_TOP + 12, w, 36, 8);
      ctx.fill();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = "#fff";
      ctx.font = "bold 16px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(state.msg, W / 2, FIELD_TOP + 30);
      ctx.globalAlpha = 1;
    }
  }

  function drawEndOverlay() {
    if (!state.gameOver && !state.victory) return;
    ctx.fillStyle = "rgba(0,0,0,0.55)";
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = state.victory ? "#5cb85c" : "#d9534f";
    ctx.font = "bold 56px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(state.victory ? "VICTORIA" : "DERROTA", W / 2, H / 2 - 40);

    ctx.fillStyle = "#fff";
    ctx.font = "16px sans-serif";
    ctx.fillText(
      state.victory ? "Has detenido la infeccion. ¡Sistema inmune al maximo!" : "Los patogenos invadieron el organismo.",
      W / 2, H / 2 + 8
    );

    drawButton(UI.restartBtn, "Reiniciar", "#1f8a4c", "#16632f", true);
  }

  function render() {
    clearCanvas();
    drawPath();

    // Towers below enemies for clarity? Towers above is more readable
    for (var i = 0; i < state.towers.length; i++) drawTower(state.towers[i]);
    for (var j = 0; j < state.enemies.length; j++) drawEnemy(state.enemies[j]);
    for (var k = 0; k < state.projectiles.length; k++) drawProjectile(state.projectiles[k]);
    for (var m = 0; m < state.effects.length; m++) drawEffect(state.effects[m]);

    drawGhost();
    drawHUD();
    drawPanel();
    drawMessage();

    // Place-fail flash
    if (state.time - state.lastPlaceFailedAt < 0.25) {
      var a = 1 - (state.time - state.lastPlaceFailedAt) / 0.25;
      ctx.strokeStyle = "rgba(220, 70, 70, " + a + ")";
      ctx.lineWidth = 4;
      ctx.strokeRect(2, FIELD_TOP + 2, W - 4, FIELD_BOTTOM - FIELD_TOP - 4);
    }

    drawEndOverlay();
  }

  // -------- LOOP ----------------------------------------------------------
  var lastT = performance.now();
  function loop(now) {
    var dt = Math.min(0.05, (now - lastT) / 1000);
    lastT = now;
    state.time += dt;
    if (!state.gameOver && !state.victory) {
      updateWave(dt);
      updateEnemies(dt);
      updateTowers(dt);
      updateProjectiles(dt);
    }
    updateEffects(dt);
    if (state.msgTimer > 0) state.msgTimer -= dt;
    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // -------- RESPONSIVE SIZING --------------------------------------------
  function resize() {
    var ratio = W / H;
    var ww = window.innerWidth;
    var wh = window.innerHeight;
    var w, h;
    if (ww / wh > ratio) {
      h = wh;
      w = h * ratio;
    } else {
      w = ww;
      h = w / ratio;
    }
    canvas.style.width = Math.floor(w) + "px";
    canvas.style.height = Math.floor(h) + "px";
  }
  window.addEventListener("resize", resize);
  window.addEventListener("orientationchange", resize);
  resize();

})();
</script>
</body>
