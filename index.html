<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a0e12">
<title>ImmunoDefense</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1a0e12;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
    color: #fff;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    overscroll-behavior: none;
  }
  body {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
  }
  #canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    background: #f8e8e0;
    touch-action: none;
  }
  #__safe_probe {
    position: fixed;
    top: 0; left: 0;
    width: 0; height: 0;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    visibility: hidden;
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="__safe_probe"></div>
<script>
(function () {
  "use strict";

  var canvas = document.getElementById("canvas");
  var ctx = canvas.getContext("2d");

  // -------- LAYOUT (recomputed on resize) --------------------------------
  var VW = 0, VH = 0, dpr = 1;
  var safeTop = 0, safeBottom = 0, safeLeft = 0, safeRight = 0;
  var HUD_H = 64, PANEL_H = 150;
  var FIELD_TOP = 0, FIELD_BOTTOM = 0, FIELD_LEFT = 0, FIELD_RIGHT = 0;
  var FIELD_W = 0, FIELD_H = 0;
  var U = 1; // pixel scale unit (smaller of field width/height vs design 500)
  var isPortrait = false;

  function readSafeAreas() {
    var probe = document.getElementById("__safe_probe");
    if (!probe) return;
    var cs = getComputedStyle(probe);
    safeTop = parseFloat(cs.paddingTop) || 0;
    safeBottom = parseFloat(cs.paddingBottom) || 0;
    safeLeft = parseFloat(cs.paddingLeft) || 0;
    safeRight = parseFloat(cs.paddingRight) || 0;
  }

  function resize() {
    var oldPathTotal = PATH.total || 0;
    dpr = Math.max(1, window.devicePixelRatio || 1);
    VW = window.innerWidth;
    VH = window.innerHeight;
    isPortrait = VH > VW;
    canvas.width = Math.max(1, Math.floor(VW * dpr));
    canvas.height = Math.max(1, Math.floor(VH * dpr));
    canvas.style.width = VW + "px";
    canvas.style.height = VH + "px";
    readSafeAreas();
    layout();
    rebuildPath();
    // Reproject world objects so a rotation doesn't strand towers / enemies.
    if (typeof state !== "undefined" && state) {
      for (var i = 0; i < state.towers.length; i++) {
        var t = state.towers[i];
        if (typeof t.nx === "number") {
          t.x = FIELD_LEFT + t.nx * FIELD_W;
          t.y = FIELD_TOP + t.ny * FIELD_H;
        }
      }
      if (oldPathTotal > 0 && PATH.total > 0) {
        var ratio = PATH.total / oldPathTotal;
        for (var j = 0; j < state.enemies.length; j++) {
          var e = state.enemies[j];
          e.progress *= ratio;
          var p = pathPos(e.progress);
          e.x = p.x;
          e.y = p.y;
        }
      }
      // Projectiles aimed at obsolete coords; safest to drop them.
      state.projectiles = [];
    }
  }

  function layout() {
    var hudBase = Math.max(48, Math.min(72, VH * 0.075));
    var panelBase = isPortrait
      ? Math.max(200, Math.min(250, VH * 0.30))
      : Math.max(120, Math.min(180, VH * 0.22));
    HUD_H = Math.round(hudBase + safeTop);
    PANEL_H = Math.round(panelBase + safeBottom);
    FIELD_TOP = HUD_H;
    FIELD_BOTTOM = VH - PANEL_H;
    FIELD_LEFT = safeLeft;
    FIELD_RIGHT = VW - safeRight;
    FIELD_W = FIELD_RIGHT - FIELD_LEFT;
    FIELD_H = FIELD_BOTTOM - FIELD_TOP;
    U = Math.max(0.4, Math.min(FIELD_W, FIELD_H) / 500);
    layoutUI();
  }

  // -------- PATH (normalized inside field) -------------------------------
  // Landscape: enters left ("Herida"), exits right ("Vaso"), horizontal snake.
  var PATH_LANDSCAPE = [
    { x: -0.05, y: 0.18 },
    { x:  0.22, y: 0.18 },
    { x:  0.22, y: 0.55 },
    { x:  0.58, y: 0.55 },
    { x:  0.58, y: 0.85 },
    { x:  1.05, y: 0.85 }
  ];
  // Portrait: enters top ("Herida"), exits bottom ("Vaso"), vertical snake.
  var PATH_PORTRAIT = [
    { x: 0.20, y: -0.05 },
    { x: 0.20, y:  0.18 },
    { x: 0.78, y:  0.18 },
    { x: 0.78, y:  0.42 },
    { x: 0.22, y:  0.42 },
    { x: 0.22, y:  0.66 },
    { x: 0.78, y:  0.66 },
    { x: 0.78, y:  0.88 },
    { x: 0.30, y:  0.88 },
    { x: 0.30, y:  1.05 }
  ];
  var PATH = { points: [], segs: [], total: 0, orientation: null };

  function rebuildPath() {
    var src = isPortrait ? PATH_PORTRAIT : PATH_LANDSCAPE;
    PATH.orientation = isPortrait ? "portrait" : "landscape";
    var pts = [];
    for (var i = 0; i < src.length; i++) {
      pts.push({
        x: FIELD_LEFT + src[i].x * FIELD_W,
        y: FIELD_TOP + src[i].y * FIELD_H
      });
    }
    PATH.points = pts;
    PATH.segs = [];
    PATH.total = 0;
    for (var j = 0; j < pts.length - 1; j++) {
      var a = pts[j], b = pts[j + 1];
      var len = Math.hypot(b.x - a.x, b.y - a.y);
      PATH.segs.push({ a: a, b: b, len: len, start: PATH.total });
      PATH.total += len;
    }
  }

  function pathPos(progress) {
    if (progress <= 0) return { x: PATH.points[0].x, y: PATH.points[0].y };
    if (progress >= PATH.total) {
      var last = PATH.points[PATH.points.length - 1];
      return { x: last.x, y: last.y };
    }
    for (var i = 0; i < PATH.segs.length; i++) {
      var s = PATH.segs[i];
      if (progress < s.start + s.len) {
        var t = (progress - s.start) / s.len;
        return { x: s.a.x + (s.b.x - s.a.x) * t, y: s.a.y + (s.b.y - s.a.y) * t };
      }
    }
    var l = PATH.points[PATH.points.length - 1];
    return { x: l.x, y: l.y };
  }

  function distPointToPath(x, y) {
    var best = Infinity;
    for (var i = 0; i < PATH.segs.length; i++) {
      var s = PATH.segs[i];
      var dx = s.b.x - s.a.x, dy = s.b.y - s.a.y;
      var len2 = dx * dx + dy * dy;
      var d;
      if (len2 === 0) {
        d = Math.hypot(x - s.a.x, y - s.a.y);
      } else {
        var t = ((x - s.a.x) * dx + (y - s.a.y) * dy) / len2;
        if (t < 0) t = 0; else if (t > 1) t = 1;
        d = Math.hypot(x - (s.a.x + t * dx), y - (s.a.y + t * dy));
      }
      if (d < best) best = d;
    }
    return best;
  }

  // -------- DEFINITIONS ---------------------------------------------------
  // Distances/speeds in design pixels; multiplied by U at use.
  var TOWER_DEFS = {
    macrofago: {
      id: "macrofago",
      name: "Macrofago",
      color: "#2c7be5",
      colorDark: "#1a4f99",
      cost: 50,
      desc: "Cuerpo a cuerpo",
      levels: [
        { range:  90, damage: 25, fireRate: 1.0, projectileSpeed:   0, splash:  0 },
        { range: 100, damage: 45, fireRate: 1.2, projectileSpeed:   0, splash:  0 },
        { range: 110, damage: 75, fireRate: 1.4, projectileSpeed:   0, splash:  0 }
      ],
      upgradeCost: [60, 110]
    },
    linfocitoB: {
      id: "linfocitoB",
      name: "Linfocito B",
      color: "#11a07f",
      colorDark: "#0a6655",
      cost: 75,
      desc: "Anticuerpos a distancia",
      levels: [
        { range: 180, damage: 15, fireRate: 1.5, projectileSpeed: 380, splash: 0 },
        { range: 210, damage: 24, fireRate: 1.8, projectileSpeed: 430, splash: 0 },
        { range: 240, damage: 38, fireRate: 2.2, projectileSpeed: 480, splash: 0 }
      ],
      upgradeCost: [85, 140]
    },
    linfocitoT: {
      id: "linfocitoT",
      name: "Linfocito T",
      color: "#7c3fcc",
      colorDark: "#4d2080",
      cost: 110,
      desc: "Citotoxico (area)",
      levels: [
        { range: 110, damage:  40, fireRate: 0.7, projectileSpeed: 320, splash: 55 },
        { range: 125, damage:  65, fireRate: 0.85, projectileSpeed: 360, splash: 65 },
        { range: 140, damage: 100, fireRate: 1.0, projectileSpeed: 400, splash: 75 }
      ],
      upgradeCost: [120, 200]
    }
  };
  var TOWER_LIST = ["macrofago", "linfocitoB", "linfocitoT"];

  // BASE_SPEED in design px/s; multiplied by U each frame for actual movement.
  var BASE_SPEED = 60;
  var ENEMY_DEFS = {
    bacteria: { id: "bacteria", name: "Bacteria", color: "#c54040", colorDark: "#7a1f1f", radius: 14, speedMult: 0.6, hp:  200, reward:  10, isBoss: false },
    virus:    { id: "virus",    name: "Virus",    color: "#7d2bb3", colorDark: "#4a1670", radius:  9, speedMult: 1.5, hp:   80, reward:   5, isBoss: false },
    hongo:    { id: "hongo",    name: "Hongo",    color: "#a02b6e", colorDark: "#5e1a40", radius: 12, speedMult: 1.0, hp:  140, reward:  15, isBoss: false },
    boss:     { id: "boss",     name: "Boss",     color: "#3a2030", colorDark: "#000000", radius: 42, speedMult: 0.4, hp: 2000, reward: 100, isBoss: true  }
  };

  // Wave 1: only bacteria. Wave 2: bacteria + virus. Wave 3+: all 3 types.
  // Wave 8: BOSS + escorts.
  var WAVES = [
    { groups: [
      { type: "bacteria", count: 8, interval: 1.4 }
    ], hpMult: 1.0 },
    { groups: [
      { type: "bacteria", count: 6, interval: 1.3 },
      { type: "virus",    count: 6, interval: 0.7 }
    ], hpMult: 1.0 },
    { groups: [
      { type: "bacteria", count: 5, interval: 1.3 },
      { type: "virus",    count: 6, interval: 0.6 },
      { type: "hongo",    count: 4, interval: 1.0 }
    ], hpMult: 1.05 },
    { groups: [
      { type: "virus",    count: 10, interval: 0.55 },
      { type: "hongo",    count:  6, interval: 0.9  },
      { type: "bacteria", count:  4, interval: 1.3  }
    ], hpMult: 1.10 },
    { groups: [
      { type: "hongo",    count: 10, interval: 0.85 },
      { type: "bacteria", count:  6, interval: 1.20 },
      { type: "virus",    count:  8, interval: 0.50 }
    ], hpMult: 1.15 },
    { groups: [
      { type: "bacteria", count:  8, interval: 1.10 },
      { type: "virus",    count: 12, interval: 0.45 },
      { type: "hongo",    count:  8, interval: 0.85 }
    ], hpMult: 1.25 },
    { groups: [
      { type: "hongo",    count: 14, interval: 0.7 },
      { type: "virus",    count: 14, interval: 0.4 },
      { type: "bacteria", count:  8, interval: 1.0 }
    ], hpMult: 1.35 },
    { groups: [
      { type: "bacteria", count:  6, interval: 1.0 },
      { type: "virus",    count: 10, interval: 0.5 },
      { type: "boss",     count:  1, interval: 0.0 },
      { type: "hongo",    count:  6, interval: 0.9 }
    ], hpMult: 1.5 }
  ];

  // -------- STATE ---------------------------------------------------------
  var state;
  function newState() {
    return {
      atp: 100,
      lives: 20,
      waveIdx: 0,
      waveActive: false,
      pendingSpawns: [],
      spawnElapsed: 0,
      towers: [],
      enemies: [],
      projectiles: [],
      effects: [],
      selectedToBuild: null,
      selectedTower: null,
      pointer: { x: 0, y: 0, isOver: false },
      lastPlaceFailedAt: -10,
      msg: "",
      msgTimer: 0,
      gameOver: false,
      victory: false,
      time: 0,
      confirmRestart: false
    };
  }
  state = newState();

  // -------- UI RECTS (recomputed in layoutUI) ----------------------------
  var UI = {};
  function layoutUI() {
    var topY = safeTop + 8;
    var hudInner = HUD_H - safeTop - 16;
    var btnH = Math.min(40, Math.max(32, hudInner));
    var rightX = VW - safeRight - 8;

    UI.restartBtn = { x: rightX - btnH, y: topY, w: btnH, h: btnH };
    // Next-wave button width: portrait keeps it tight so stats fit beside it.
    var nwMaxByStats = isPortrait
      ? VW - safeLeft - safeRight - btnH - 24 - 165 // reserve ~165px for compact stats
      : VW * 0.4;
    var nwW = Math.min(220, Math.max(110, nwMaxByStats));
    UI.nextWaveBtn = { x: UI.restartBtn.x - nwW - 8, y: topY, w: nwW, h: btnH };

    var panelTop = VH - PANEL_H + 8;
    var panelInner = PANEL_H - 16 - safeBottom;
    var panelLeft = safeLeft + 8;
    var panelRight = VW - safeRight - 8;
    var panelW = panelRight - panelLeft;

    if (isPortrait) {
      // Portrait: full-width row of 3 cards + bottom row for info & action buttons.
      var cardCount = 3;
      var cardGap = 8;
      var cardW = (panelW - cardGap * (cardCount - 1)) / cardCount;
      var cardH = Math.min(Math.max(panelInner * 0.50, 80), 100);
      UI.cards = [];
      for (var i = 0; i < cardCount; i++) {
        UI.cards.push({
          x: panelLeft + i * (cardW + cardGap),
          y: panelTop,
          w: cardW,
          h: cardH
        });
      }
      var infoY = panelTop + cardH + 6;
      var infoH = panelInner - cardH - 6;
      UI.infoX = panelLeft;
      UI.infoY = infoY;
      UI.infoW = panelW;
      UI.infoH = infoH;
      var actionH = Math.min(38, Math.max(32, infoH * 0.55));
      var actionY = infoY + infoH - actionH;
      var deselectW = Math.min(96, panelW * 0.30);
      UI.deselectBtn = { x: panelLeft + panelW - deselectW, y: infoY, w: deselectW, h: 22 };
      var sellW = Math.max(96, panelW * 0.42);
      UI.sellBtn = { x: panelLeft, y: actionY, w: sellW, h: actionH };
      UI.upgradeBtn = { x: panelLeft + sellW + 8, y: actionY, w: panelW - sellW - 8, h: actionH };
    } else {
      var cardCountL = 3;
      var cardGapL = 6;
      var cardWL = Math.max(70, Math.min(108, (panelW * 0.5 - cardGapL * (cardCountL - 1)) / cardCountL));
      var cardHL = Math.max(96, Math.min(panelInner, 116));
      UI.cards = [];
      for (var k = 0; k < cardCountL; k++) {
        UI.cards.push({
          x: panelLeft + k * (cardWL + cardGapL),
          y: panelTop,
          w: cardWL,
          h: cardHL
        });
      }
      var infoXL = panelLeft + cardCountL * (cardWL + cardGapL) + 8;
      var infoWL = Math.max(140, panelRight - infoXL);
      UI.infoX = infoXL;
      UI.infoW = infoWL;
      UI.infoY = panelTop;
      UI.infoH = cardHL;
      var deselectWL = Math.min(108, infoWL * 0.45);
      UI.deselectBtn = { x: infoXL + infoWL - deselectWL, y: panelTop, w: deselectWL, h: 26 };
      var sellWL = Math.min(150, Math.max(80, infoWL * 0.42));
      UI.sellBtn = { x: infoXL, y: panelTop + cardHL - 36, w: sellWL, h: 36 };
      UI.upgradeBtn = { x: infoXL + sellWL + 8, y: panelTop + cardHL - 36, w: infoWL - sellWL - 8, h: 36 };
    }

    var modalW = Math.min(340, VW - 32);
    var modalH = 180;
    UI.modal = { x: (VW - modalW) / 2, y: (VH - modalH) / 2, w: modalW, h: modalH };
    var btnsW = (modalW - 48) / 2;
    UI.modalYes = { x: UI.modal.x + 16, y: UI.modal.y + modalH - 56, w: btnsW, h: 40 };
    UI.modalNo  = { x: UI.modalYes.x + btnsW + 16, y: UI.modalYes.y, w: btnsW, h: 40 };

    UI.endRestartBtn = { x: VW / 2 - 90, y: VH / 2 + 30, w: 180, h: 50 };
  }

  // -------- WAVES / SPAWN -------------------------------------------------
  function startNextWave() {
    if (state.waveActive || state.gameOver || state.victory || state.confirmRestart) return;
    if (state.waveIdx >= WAVES.length) return;
    var wave = WAVES[state.waveIdx];
    state.waveIdx += 1;
    state.waveActive = true;
    state.spawnElapsed = 0;
    state.pendingSpawns = [];
    var t = 0;
    for (var i = 0; i < wave.groups.length; i++) {
      var g = wave.groups[i];
      for (var k = 0; k < g.count; k++) {
        state.pendingSpawns.push({ type: g.type, time: t, hpMult: wave.hpMult });
        t += g.interval;
      }
      t += 0.6;
    }
    showMsg("Oleada " + state.waveIdx + " iniciada");
  }

  function spawnEnemy(typeId, hpMult) {
    var def = ENEMY_DEFS[typeId];
    state.enemies.push({
      def: def,
      hp: def.hp * hpMult,
      maxHp: def.hp * hpMult,
      progress: 0,
      x: PATH.points[0].x,
      y: PATH.points[0].y,
      wobble: Math.random() * Math.PI * 2,
      dead: false
    });
  }

  function updateWave(dt) {
    if (!state.waveActive) return;
    state.spawnElapsed += dt;
    while (state.pendingSpawns.length && state.pendingSpawns[0].time <= state.spawnElapsed) {
      var s = state.pendingSpawns[0];
      // Single-file enforcement: if any live enemy is still very close to entry, hold.
      var def = ENEMY_DEFS[s.type];
      var minSep = (def.radius + 10) * 2 * U;
      var minProgress = Infinity;
      for (var i = 0; i < state.enemies.length; i++) {
        if (state.enemies[i].progress < minProgress) minProgress = state.enemies[i].progress;
      }
      if (state.enemies.length > 0 && minProgress < minSep) break;
      state.pendingSpawns.shift();
      spawnEnemy(s.type, s.hpMult);
    }
    if (!state.pendingSpawns.length && !state.enemies.length) {
      state.waveActive = false;
      var bonus = 25 + state.waveIdx * 5;
      state.atp += bonus;
      if (state.waveIdx >= WAVES.length) {
        state.victory = true;
        showMsg("VICTORIA");
      } else {
        showMsg("Oleada superada (+" + bonus + " ATP)");
      }
    }
  }

  // -------- ENEMIES -------------------------------------------------------
  function updateEnemies(dt) {
    for (var i = 0; i < state.enemies.length; i++) {
      var e = state.enemies[i];
      if (e.dead) continue;
      var pxSpeed = e.def.speedMult * BASE_SPEED * U;
      e.progress += pxSpeed * dt;
      e.wobble += dt * 6;
      if (e.progress >= PATH.total) {
        e.dead = true;
        var damageToPlayer = e.def.isBoss ? 5 : 1;
        state.lives -= damageToPlayer;
        spawnEffect("escape", e.x, e.y);
        if (state.lives <= 0) {
          state.lives = 0;
          state.gameOver = true;
          showMsg("DERROTA");
        }
      } else {
        var p = pathPos(e.progress);
        e.x = p.x;
        e.y = p.y;
      }
    }
    state.enemies = state.enemies.filter(function (e) { return !e.dead; });
  }

  // -------- TOWERS --------------------------------------------------------
  function placeTower(x, y, typeId) {
    var def = TOWER_DEFS[typeId];
    state.towers.push({
      x: x, y: y,
      nx: FIELD_W > 0 ? (x - FIELD_LEFT) / FIELD_W : 0,
      ny: FIELD_H > 0 ? (y - FIELD_TOP) / FIELD_H : 0,
      def: def,
      level: 0,
      cooldown: 0,
      muzzleFlash: 0,
      placedAt: state.time
    });
    state.effects.push({ kind: "place", x: x, y: y, life: 0.6, max: 0.6, color: def.color });
  }

  function towerStats(t) { return t.def.levels[t.level]; }

  function updateTowers(dt) {
    for (var i = 0; i < state.towers.length; i++) {
      var t = state.towers[i];
      if (t.cooldown > 0) t.cooldown -= dt;
      if (t.muzzleFlash > 0) t.muzzleFlash -= dt;
      if (t.cooldown > 0) continue;
      var stats = towerStats(t);
      var rangePx = stats.range * U;
      var target = null, bestProgress = -1;
      for (var j = 0; j < state.enemies.length; j++) {
        var e = state.enemies[j];
        if (e.dead) continue;
        var d = Math.hypot(e.x - t.x, e.y - t.y);
        if (d <= rangePx && e.progress > bestProgress) {
          bestProgress = e.progress;
          target = e;
        }
      }
      if (target) {
        fireTower(t, target);
        t.cooldown = 1 / stats.fireRate;
        t.muzzleFlash = 0.08;
      }
    }
  }

  function fireTower(t, target) {
    var stats = towerStats(t);
    if (stats.projectileSpeed === 0) {
      damageEnemy(target, stats.damage);
      state.effects.push({ kind: "melee", x1: t.x, y1: t.y, x2: target.x, y2: target.y, life: 0.18, max: 0.18, color: t.def.color });
    } else {
      state.projectiles.push({
        x: t.x, y: t.y,
        target: target,
        damage: stats.damage,
        speedDesign: stats.projectileSpeed,
        splashDesign: stats.splash,
        color: t.def.color,
        dead: false
      });
    }
  }

  function damageEnemy(e, amount) {
    if (e.dead) return;
    e.hp -= amount;
    if (e.hp <= 0) {
      e.dead = true;
      state.atp += e.def.reward;
      spawnEffect("death", e.x, e.y, e.def.color);
    }
  }

  // -------- PROJECTILES ---------------------------------------------------
  function updateProjectiles(dt) {
    for (var i = 0; i < state.projectiles.length; i++) {
      var p = state.projectiles[i];
      if (p.dead) continue;
      if (!p.target || p.target.dead) { p.dead = true; continue; }
      var dx = p.target.x - p.x, dy = p.target.y - p.y;
      var d = Math.hypot(dx, dy);
      var step = p.speedDesign * U * dt;
      if (d <= step + 4) {
        var splashPx = p.splashDesign * U;
        if (splashPx > 0) {
          for (var j = 0; j < state.enemies.length; j++) {
            var e = state.enemies[j];
            if (e.dead) continue;
            if (Math.hypot(e.x - p.target.x, e.y - p.target.y) <= splashPx) {
              damageEnemy(e, p.damage);
            }
          }
          state.effects.push({ kind: "explosion", x: p.target.x, y: p.target.y, r: 0, max: splashPx, life: 0.4, color: p.color });
        } else {
          damageEnemy(p.target, p.damage);
          state.effects.push({ kind: "hit", x: p.target.x, y: p.target.y, life: 0.2, max: 0.2, color: p.color });
        }
        p.dead = true;
      } else {
        p.x += (dx / d) * step;
        p.y += (dy / d) * step;
      }
    }
    state.projectiles = state.projectiles.filter(function (p) { return !p.dead; });
  }

  // -------- EFFECTS -------------------------------------------------------
  function spawnEffect(kind, x, y, color) {
    if (kind === "death") {
      for (var i = 0; i < 6; i++) {
        var ang = Math.random() * Math.PI * 2;
        var spd = (40 + Math.random() * 60) * U;
        state.effects.push({
          kind: "particle",
          x: x, y: y,
          vx: Math.cos(ang) * spd,
          vy: Math.sin(ang) * spd,
          life: 0.4 + Math.random() * 0.2,
          max: 0.6,
          color: color || "#fff"
        });
      }
    } else if (kind === "escape") {
      state.effects.push({ kind: "escape", x: x, y: y, life: 0.6, max: 0.6 });
    }
  }

  function updateEffects(dt) {
    for (var i = 0; i < state.effects.length; i++) {
      var ef = state.effects[i];
      ef.life -= dt;
      if (ef.kind === "particle") {
        ef.x += ef.vx * dt;
        ef.y += ef.vy * dt;
        ef.vx *= 0.92;
        ef.vy *= 0.92;
      } else if (ef.kind === "explosion") {
        ef.r = ef.max * (1 - ef.life / 0.4);
      }
    }
    state.effects = state.effects.filter(function (e) { return e.life > 0; });
  }

  // -------- INPUT ---------------------------------------------------------
  function canvasPosFromEvent(evt) {
    var rect = canvas.getBoundingClientRect();
    var clientX = evt.clientX, clientY = evt.clientY;
    if (clientX === undefined && evt.touches && evt.touches[0]) {
      clientX = evt.touches[0].clientX;
      clientY = evt.touches[0].clientY;
    }
    return { x: clientX - rect.left, y: clientY - rect.top };
  }

  function inRect(x, y, r) {
    return r && x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
  }

  function handleClick(x, y) {
    // Confirmation modal: only modal buttons respond.
    if (state.confirmRestart) {
      if (inRect(x, y, UI.modalYes)) {
        state = newState();
      } else if (inRect(x, y, UI.modalNo)) {
        state.confirmRestart = false;
      }
      return;
    }
    // End overlay
    if (state.gameOver || state.victory) {
      if (inRect(x, y, UI.endRestartBtn)) state = newState();
      return;
    }
    // HUD
    if (y < FIELD_TOP) {
      if (inRect(x, y, UI.restartBtn)) {
        state.confirmRestart = true;
        return;
      }
      if (inRect(x, y, UI.nextWaveBtn) && !state.waveActive && state.waveIdx < WAVES.length) {
        startNextWave();
        return;
      }
      return;
    }
    // Panel
    if (y >= FIELD_BOTTOM) {
      for (var i = 0; i < UI.cards.length; i++) {
        if (inRect(x, y, UI.cards[i])) {
          var typeId = TOWER_LIST[i];
          if (state.atp >= TOWER_DEFS[typeId].cost) {
            state.selectedToBuild = state.selectedToBuild === typeId ? null : typeId;
            state.selectedTower = null;
          } else {
            flashFail();
          }
          return;
        }
      }
      if (state.selectedTower) {
        if (inRect(x, y, UI.deselectBtn)) { state.selectedTower = null; return; }
        if (inRect(x, y, UI.sellBtn)) { sellTower(state.selectedTower); return; }
        if (state.selectedTower.level < 2 && inRect(x, y, UI.upgradeBtn)) {
          tryUpgrade(state.selectedTower); return;
        }
      }
      return;
    }
    // Field
    if (state.selectedToBuild) {
      if (canPlaceTowerAt(x, y)) {
        var def = TOWER_DEFS[state.selectedToBuild];
        if (state.atp >= def.cost) {
          state.atp -= def.cost;
          placeTower(x, y, state.selectedToBuild);
          if (state.atp < def.cost) state.selectedToBuild = null;
        }
      } else {
        flashFail();
      }
      return;
    }
    // Try to select an existing tower (range indicator shows on selection).
    var picked = null;
    for (var t = 0; t < state.towers.length; t++) {
      var tw = state.towers[t];
      if (Math.hypot(tw.x - x, tw.y - y) <= 24 * U) { picked = tw; break; }
    }
    state.selectedTower = picked;
  }

  function canPlaceTowerAt(x, y) {
    var pad = 24 * U;
    if (y < FIELD_TOP + pad || y > FIELD_BOTTOM - pad) return false;
    if (x < FIELD_LEFT + pad || x > FIELD_RIGHT - pad) return false;
    if (distPointToPath(x, y) < 28 * U) return false;
    for (var i = 0; i < state.towers.length; i++) {
      if (Math.hypot(state.towers[i].x - x, state.towers[i].y - y) < 38 * U) return false;
    }
    return true;
  }

  function tryUpgrade(t) {
    if (t.level >= 2) return;
    var cost = t.def.upgradeCost[t.level];
    if (state.atp < cost) { flashFail(); return; }
    state.atp -= cost;
    t.level += 1;
    showMsg(t.def.name + " mejorado a Nv " + (t.level + 1));
  }

  function sellTower(t) {
    var refund = Math.floor(t.def.cost * 0.6);
    for (var i = 0; i < t.level; i++) refund += Math.floor(t.def.upgradeCost[i] * 0.5);
    state.atp += refund;
    state.towers = state.towers.filter(function (x) { return x !== t; });
    state.selectedTower = null;
    showMsg("Vendido (+" + refund + " ATP)");
  }

  function flashFail() { state.lastPlaceFailedAt = state.time; }
  function showMsg(text) { state.msg = text; state.msgTimer = 1.6; }

  function onPointerDown(evt) {
    evt.preventDefault();
    var p = canvasPosFromEvent(evt);
    state.pointer.x = p.x; state.pointer.y = p.y; state.pointer.isOver = true;
    handleClick(p.x, p.y);
  }
  function onPointerMove(evt) {
    var p = canvasPosFromEvent(evt);
    state.pointer.x = p.x; state.pointer.y = p.y; state.pointer.isOver = true;
  }
  function onPointerLeave() { state.pointer.isOver = false; }

  canvas.addEventListener("pointerdown", onPointerDown);
  canvas.addEventListener("pointermove", onPointerMove);
  canvas.addEventListener("pointerleave", onPointerLeave);
  canvas.addEventListener("contextmenu", function (e) { e.preventDefault(); });
  document.addEventListener("keydown", function (e) {
    if (e.key === " " || e.code === "Space") {
      e.preventDefault();
      if (state.confirmRestart) { state.confirmRestart = false; return; }
      if (!state.waveActive && !state.gameOver && !state.victory) startNextWave();
    } else if (e.key === "Escape") {
      if (state.confirmRestart) state.confirmRestart = false;
      else { state.selectedToBuild = null; state.selectedTower = null; }
    } else if (e.key === "1") { state.selectedToBuild = "macrofago"; state.selectedTower = null;
    } else if (e.key === "2") { state.selectedToBuild = "linfocitoB"; state.selectedTower = null;
    } else if (e.key === "3") { state.selectedToBuild = "linfocitoT"; state.selectedTower = null;
    } else if (e.key === "r" || e.key === "R") {
      state.confirmRestart = true;
    }
  });

  // -------- RENDER --------------------------------------------------------
  function clearCanvas() {
    ctx.fillStyle = "#f8e8e0";
    ctx.fillRect(0, 0, VW, VH);
    // Tissue speckles only over field area.
    ctx.fillStyle = "rgba(200, 140, 130, 0.18)";
    var seed = 13;
    var n = Math.max(40, Math.round(FIELD_W * FIELD_H / 7000));
    for (var i = 0; i < n; i++) {
      seed = (seed * 9301 + 49297) % 233280;
      var x = FIELD_LEFT + (seed / 233280) * FIELD_W;
      seed = (seed * 9301 + 49297) % 233280;
      var y = FIELD_TOP + (seed / 233280) * FIELD_H;
      seed = (seed * 9301 + 49297) % 233280;
      var r = (1 + (seed / 233280) * 3) * U;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function strokePathLine() {
    ctx.beginPath();
    ctx.moveTo(PATH.points[0].x, PATH.points[0].y);
    for (var i = 1; i < PATH.points.length; i++) {
      ctx.lineTo(PATH.points[i].x, PATH.points[i].y);
    }
    ctx.stroke();
  }

  function drawPath() {
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = "#e8b8b0"; ctx.lineWidth = 38 * U; strokePathLine();
    ctx.strokeStyle = "#d8978b"; ctx.lineWidth = 30 * U; strokePathLine();
    ctx.strokeStyle = "#c47a6e"; ctx.lineWidth = 22 * U; strokePathLine();
    ctx.strokeStyle = "rgba(255,255,255,0.18)";
    ctx.lineWidth = 4 * U;
    ctx.setLineDash([10 * U, 14 * U]);
    strokePathLine();
    ctx.setLineDash([]);
    drawLabelMarker(PATH.points[0].x + 18 * U, PATH.points[0].y, "Herida", "#7a1f1f");
    var last = PATH.points[PATH.points.length - 1];
    drawLabelMarker(last.x - 18 * U, last.y, "Vaso", "#3b1d6b");
  }

  function drawLabelMarker(x, y, text, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, 9 * U, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.font = (11 * Math.max(0.85, U)).toFixed(0) + "px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "top";
    ctx.fillText(text, x, y + 14 * U);
  }

  function drawHexagon(cx, cy, r, fill, stroke, strokeW) {
    ctx.beginPath();
    for (var i = 0; i < 6; i++) {
      var a = Math.PI / 3 * i - Math.PI / 2;
      var x = cx + Math.cos(a) * r;
      var y = cy + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    if (fill) { ctx.fillStyle = fill; ctx.fill(); }
    if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = strokeW || 2; ctx.stroke(); }
  }

  function drawRangeIndicator(x, y, rangePx, color) {
    ctx.fillStyle = "rgba(50, 60, 90, 0.10)";
    ctx.strokeStyle = color || "rgba(60, 80, 130, 0.55)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y, rangePx, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  }

  function drawTower(t) {
    var stats = towerStats(t);
    if (state.selectedTower === t) {
      drawRangeIndicator(t.x, t.y, stats.range * U, "rgba(60, 80, 130, 0.55)");
    }
    if (t.muzzleFlash > 0) {
      ctx.fillStyle = "rgba(255, 240, 180, 0.55)";
      ctx.beginPath();
      ctx.arc(t.x, t.y, 26 * U, 0, Math.PI * 2);
      ctx.fill();
    }
    drawHexagon(t.x, t.y, 20 * U, t.def.color, t.def.colorDark, 2);
    drawHexagon(t.x, t.y, 11 * U, "#ffffff", null);
    ctx.fillStyle = t.def.colorDark;
    for (var i = 0; i <= t.level; i++) {
      ctx.beginPath();
      ctx.arc(t.x - 6 * U + i * 6 * U, t.y - 1 * U, 2.2 * U, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawEnemy(e) {
    var def = e.def;
    var rad = def.radius * U;
    var wob = Math.sin(e.wobble) * 1.5 * U;
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.fillStyle = def.colorDark;
    ctx.beginPath();
    ctx.arc(2 * U, 2 * U, rad, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = def.color;
    ctx.beginPath();
    ctx.arc(0, wob * 0.2, rad, 0, Math.PI * 2);
    ctx.fill();
    if (def.id === "virus") {
      ctx.strokeStyle = def.colorDark;
      ctx.lineWidth = 2;
      for (var i = 0; i < 6; i++) {
        var a = i * Math.PI / 3 + e.wobble * 0.3;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * rad, Math.sin(a) * rad);
        ctx.lineTo(Math.cos(a) * (rad + 4 * U), Math.sin(a) * (rad + 4 * U));
        ctx.stroke();
      }
    } else if (def.id === "hongo") {
      ctx.fillStyle = "rgba(255,255,255,0.4)";
      ctx.beginPath(); ctx.arc(-3 * U, -3 * U, 3 * U, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc( 4 * U,  1 * U, 2 * U, 0, Math.PI * 2); ctx.fill();
    } else if (def.id === "bacteria") {
      ctx.fillStyle = def.colorDark;
      ctx.beginPath();
      ctx.arc(-3 * U, -2 * U, 2.5 * U, 0, Math.PI * 2);
      ctx.arc( 3 * U,  2 * U, 2.5 * U, 0, Math.PI * 2);
      ctx.fill();
    } else if (def.id === "boss") {
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(0, 0, rad * 0.55, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.arc(-rad * 0.3, -rad * 0.2, rad * 0.12, 0, Math.PI * 2);
      ctx.arc( rad * 0.3, -rad * 0.2, rad * 0.12, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    var hpRatio = Math.max(0, e.hp / e.maxHp);
    var bw = Math.max(20 * U, rad * 2);
    var bh = 4 * Math.max(1, U * 0.9);
    ctx.fillStyle = "rgba(0,0,0,0.55)";
    ctx.fillRect(e.x - bw / 2, e.y - rad - 9 * U, bw, bh);
    ctx.fillStyle = hpRatio > 0.5 ? "#5cb85c" : hpRatio > 0.25 ? "#f0ad4e" : "#d9534f";
    ctx.fillRect(e.x - bw / 2, e.y - rad - 9 * U, bw * hpRatio, bh);
  }

  function drawProjectile(p) {
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, (p.splashDesign > 0 ? 6 : 4) * U, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,0.35)";
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  function drawEffect(ef) {
    var alpha = Math.max(0, ef.life / ef.max);
    if (ef.kind === "particle") {
      ctx.fillStyle = ef.color;
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(ef.x, ef.y, 3 * U, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if (ef.kind === "hit") {
      ctx.strokeStyle = ef.color;
      ctx.globalAlpha = alpha;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(ef.x, ef.y, (8 + (1 - alpha) * 10) * U, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    } else if (ef.kind === "explosion") {
      ctx.fillStyle = ef.color;
      ctx.globalAlpha = alpha * 0.4;
      ctx.beginPath();
      ctx.arc(ef.x, ef.y, ef.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = ef.color;
      ctx.globalAlpha = alpha;
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.globalAlpha = 1;
    } else if (ef.kind === "melee") {
      ctx.strokeStyle = ef.color;
      ctx.globalAlpha = alpha;
      ctx.lineWidth = 4 * Math.max(1, U * 0.9);
      ctx.beginPath();
      ctx.moveTo(ef.x1, ef.y1);
      ctx.lineTo(ef.x2, ef.y2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    } else if (ef.kind === "escape") {
      ctx.strokeStyle = "#d9534f";
      ctx.globalAlpha = alpha;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(ef.x, ef.y, (12 + (1 - alpha) * 18) * U, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    } else if (ef.kind === "place") {
      var t = 1 - ef.life / ef.max;
      ctx.strokeStyle = ef.color;
      ctx.globalAlpha = (1 - t) * 0.85;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(ef.x, ef.y, (18 + t * 36) * U, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = ef.color;
      ctx.globalAlpha = (1 - t) * 0.35;
      ctx.beginPath();
      ctx.arc(ef.x, ef.y, (18 + t * 18) * U, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  function drawHUD() {
    ctx.fillStyle = "#3a2530";
    ctx.fillRect(0, 0, VW, FIELD_TOP);
    ctx.fillStyle = "rgba(255,255,255,0.06)";
    ctx.fillRect(0, FIELD_TOP - 2, VW, 2);

    var leftX = safeLeft + 12;
    if (isPortrait) {
      // Compact single-line stats: no labels, tiny gap, fits beside buttons.
      var midY = safeTop + (HUD_H - safeTop) / 2;
      ctx.textBaseline = "middle";
      ctx.textAlign = "left";
      ctx.font = "bold 14px sans-serif";
      ctx.fillStyle = "#f5d76e";
      ctx.fillText("⚡ " + state.atp, leftX, midY);
      ctx.fillStyle = state.lives <= 5 ? "#ff7878" : "#9adfb1";
      ctx.fillText("♥ " + state.lives, leftX + 64, midY);
      ctx.fillStyle = "#e0e0e0";
      ctx.fillText("⌖ " + state.waveIdx + "/" + WAVES.length, leftX + 118, midY);
    } else {
      var statsY = safeTop + 8;
      var fontStat = Math.max(14, Math.min(20, VW * 0.018));
      var fontLabel = Math.max(10, Math.min(13, VW * 0.012));
      drawHudStat("⚡ ATP", state.atp, leftX, statsY, "#f5d76e", fontStat, fontLabel);
      drawHudStat("♥ Vida", state.lives, leftX + Math.min(160, VW * 0.22), statsY,
        state.lives <= 5 ? "#ff7878" : "#9adfb1", fontStat, fontLabel);
      drawHudStat("⌖ Oleada", state.waveIdx + " / " + WAVES.length,
        leftX + Math.min(320, VW * 0.44), statsY, "#e0e0e0", fontStat, fontLabel);
    }

    var nwLabel = isPortrait ? "▶ Oleada" : "▶ Iniciar Oleada";
    if (!state.waveActive && state.waveIdx < WAVES.length) {
      drawButton(UI.nextWaveBtn, nwLabel, "#1f8a4c", "#16632f", true);
    } else if (state.waveActive) {
      drawButton(UI.nextWaveBtn, isPortrait ? "En curso..." : "Oleada en curso...", "#5a4250", "#3a2530", false);
    } else {
      drawButton(UI.nextWaveBtn, isPortrait ? "Fin" : "Sin mas oleadas", "#5a4250", "#3a2530", false);
    }

    var rb = UI.restartBtn;
    ctx.fillStyle = "#5a3540";
    roundRect(rb.x, rb.y, rb.w, rb.h, 8);
    ctx.fill();
    ctx.strokeStyle = "#3a2530";
    ctx.lineWidth = 1.5;
    roundRect(rb.x, rb.y, rb.w, rb.h, 8);
    ctx.stroke();
    drawRestartIcon(rb.x + rb.w / 2, rb.y + rb.h / 2, rb.h * 0.32, "#fff");
  }

  function drawRestartIcon(cx, cy, r, color) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.2;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.arc(cx, cy, r, Math.PI * 0.25, Math.PI * 1.85);
    ctx.stroke();
    // arrow tip
    var ang = Math.PI * 1.85;
    var ax = cx + Math.cos(ang) * r;
    var ay = cy + Math.sin(ang) * r;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax - r * 0.55, ay - r * 0.05);
    ctx.lineTo(ax - r * 0.05, ay - r * 0.55);
    ctx.closePath();
    ctx.fill();
  }

  function drawHudStat(label, value, x, y, color, fontStat, fontLabel) {
    ctx.fillStyle = "rgba(255,255,255,0.55)";
    ctx.font = fontLabel + "px sans-serif";
    ctx.textAlign = "left";
    ctx.textBaseline = "top";
    ctx.fillText(label, x, y);
    ctx.fillStyle = color;
    ctx.font = "bold " + fontStat + "px sans-serif";
    ctx.fillText(value, x, y + fontLabel + 4);
  }

  function drawButton(r, text, fill, stroke, enabled) {
    ctx.fillStyle = fill;
    roundRect(r.x, r.y, r.w, r.h, 8);
    ctx.fill();
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 1.5;
    roundRect(r.x, r.y, r.w, r.h, 8);
    ctx.stroke();
    ctx.fillStyle = enabled ? "#fff" : "rgba(255,255,255,0.55)";
    var fs = Math.max(11, Math.min(14, r.h * 0.36));
    ctx.font = "bold " + fs + "px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(text, r.x + r.w / 2, r.y + r.h / 2);
  }

  function roundRect(x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h - r);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function drawPanel() {
    ctx.fillStyle = "#2a1a22";
    ctx.fillRect(0, FIELD_BOTTOM, VW, VH - FIELD_BOTTOM);

    for (var i = 0; i < TOWER_LIST.length; i++) {
      var typeId = TOWER_LIST[i];
      var def = TOWER_DEFS[typeId];
      var card = UI.cards[i];
      var canAfford = state.atp >= def.cost;
      var isSelected = state.selectedToBuild === typeId;

      ctx.fillStyle = isSelected ? "#3a2538" : "#1f1219";
      roundRect(card.x, card.y, card.w, card.h, 8);
      ctx.fill();
      ctx.strokeStyle = isSelected ? def.color : "rgba(255,255,255,0.08)";
      ctx.lineWidth = isSelected ? 3 : 1.5;
      roundRect(card.x, card.y, card.w, card.h, 8);
      ctx.stroke();

      var cx = card.x + card.w / 2;
      var showDesc = card.w >= 120;
      drawHexagon(cx, card.y + card.h * 0.28, Math.min(18, card.w * 0.18), canAfford ? def.color : "#555", def.colorDark, 2);
      drawHexagon(cx, card.y + card.h * 0.28, Math.min(9, card.w * 0.09), "#fff", null);

      ctx.fillStyle = canAfford ? "#fff" : "rgba(255,255,255,0.45)";
      var fs1 = Math.max(10, Math.min(13, card.w * 0.14));
      ctx.font = "bold " + fs1 + "px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      ctx.fillText(def.name, cx, card.y + card.h * (showDesc ? 0.50 : 0.54));

      if (showDesc) {
        ctx.font = Math.max(9, Math.min(11, card.w * 0.10)) + "px sans-serif";
        ctx.fillStyle = "rgba(255,255,255,0.55)";
        ctx.fillText(def.desc, cx, card.y + card.h * 0.66);
      }

      ctx.font = "bold " + Math.max(11, Math.min(13, card.w * 0.13)) + "px sans-serif";
      ctx.fillStyle = canAfford ? "#f5d76e" : "#d9534f";
      ctx.fillText("⚡ " + def.cost, cx, card.y + card.h * (showDesc ? 0.82 : 0.78));
    }

    var infoX = UI.infoX, infoY = UI.infoY;
    ctx.textAlign = "left";
    ctx.textBaseline = "top";
    if (state.selectedTower) {
      var t = state.selectedTower;
      var stats = towerStats(t);
      ctx.fillStyle = t.def.color;
      ctx.font = "bold 15px sans-serif";
      ctx.fillText(t.def.name + "  Nv " + (t.level + 1) + "/3", infoX, infoY + 2);

      ctx.font = "12px sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.85)";
      if (isPortrait) {
        var oneLine = "Dmg " + stats.damage + (stats.splash > 0 ? " (AOE)" : "") +
          " • R " + stats.range + " • " + stats.fireRate.toFixed(1) + "/s";
        ctx.fillText(oneLine, infoX, infoY + 22);
      } else {
        ctx.fillText("Daño: " + stats.damage + (stats.splash > 0 ? "  AOE: " + stats.splash : ""), infoX, infoY + 24);
        ctx.fillText("Rango: " + stats.range + "    Cadencia: " + stats.fireRate.toFixed(2) + "/s", infoX, infoY + 40);
      }

      ctx.fillStyle = "rgba(255,255,255,0.1)";
      roundRect(UI.deselectBtn.x, UI.deselectBtn.y, UI.deselectBtn.w, UI.deselectBtn.h, 6);
      ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,0.7)";
      ctx.font = "bold 11px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(isPortrait ? "X cerrar" : "Deseleccionar",
        UI.deselectBtn.x + UI.deselectBtn.w / 2,
        UI.deselectBtn.y + UI.deselectBtn.h / 2 + 4);
      ctx.textAlign = "left";

      var sellRefund = Math.floor(t.def.cost * 0.6);
      for (var li = 0; li < t.level; li++) sellRefund += Math.floor(t.def.upgradeCost[li] * 0.5);
      drawButton(UI.sellBtn, "Vender +" + sellRefund, "#7a3a3a", "#552020", true);

      if (t.level < 2) {
        var ucost = t.def.upgradeCost[t.level];
        var canUp = state.atp >= ucost;
        drawButton(UI.upgradeBtn,
          "Mejorar Nv " + (t.level + 2) + "  ⚡" + ucost,
          canUp ? "#1f8a4c" : "#3a2530",
          canUp ? "#16632f" : "#22141c",
          canUp);
      } else {
        drawButton(UI.upgradeBtn, "Nivel maximo", "#5a4250", "#3a2530", false);
      }
    } else if (state.selectedToBuild) {
      var def2 = TOWER_DEFS[state.selectedToBuild];
      ctx.fillStyle = def2.color;
      ctx.font = "bold 15px sans-serif";
      ctx.fillText(def2.name + " — " + def2.desc, infoX, infoY + 4);
      ctx.font = "12px sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.75)";
      ctx.fillText("Toca el campo para colocar (⚡ " + def2.cost + ", ATP: " + state.atp + ")", infoX, infoY + 24);
      if (!isPortrait) {
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        ctx.fillText("ESC cancela", infoX, infoY + 42);
      }
    } else {
      ctx.fillStyle = "rgba(255,255,255,0.55)";
      ctx.font = "13px sans-serif";
      ctx.fillText(isPortrait
        ? "Toca una celula para construir."
        : "Elige una celula inmune o toca una torre.", infoX, infoY + 6);
      if (!isPortrait) {
        ctx.font = "11px sans-serif";
        ctx.fillStyle = "rgba(255,255,255,0.35)";
        ctx.fillText("1/2/3 elegir • ESC cancelar • SPACE oleada • R reiniciar", infoX, infoY + 30);
        ctx.fillText("Patogenos: bacteria lenta+fuerte • virus rapido • hongo medio", infoX, infoY + 48);
      } else {
        ctx.font = "11px sans-serif";
        ctx.fillStyle = "rgba(255,255,255,0.4)";
        ctx.fillText("Toca torre colocada para mejorar/vender.", infoX, infoY + 26);
      }
    }
  }

  function drawGhost() {
    if (!state.selectedToBuild || !state.pointer.isOver) return;
    var x = state.pointer.x, y = state.pointer.y;
    if (y < FIELD_TOP || y >= FIELD_BOTTOM) return;
    var def = TOWER_DEFS[state.selectedToBuild];
    var stats = def.levels[0];
    var ok = canPlaceTowerAt(x, y) && state.atp >= def.cost;
    ctx.fillStyle = ok ? "rgba(50, 200, 120, 0.15)" : "rgba(220, 70, 70, 0.18)";
    ctx.strokeStyle = ok ? "rgba(50, 200, 120, 0.65)" : "rgba(220, 70, 70, 0.7)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y, stats.range * U, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.globalAlpha = ok ? 0.85 : 0.5;
    drawHexagon(x, y, 20 * U, def.color, def.colorDark, 2);
    ctx.globalAlpha = 1;
  }

  function drawMessage() {
    if (state.msgTimer > 0 && state.msg) {
      var alpha = Math.min(1, state.msgTimer / 0.4);
      ctx.font = "bold 16px sans-serif";
      var w = ctx.measureText(state.msg).width + 32;
      var x = VW / 2 - w / 2;
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.globalAlpha = alpha * 0.6;
      roundRect(x, FIELD_TOP + 12, w, 36, 8);
      ctx.fill();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = "#fff";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(state.msg, VW / 2, FIELD_TOP + 30);
      ctx.globalAlpha = 1;
    }
  }

  function drawConfirmModal() {
    if (!state.confirmRestart) return;
    ctx.fillStyle = "rgba(0,0,0,0.55)";
    ctx.fillRect(0, 0, VW, VH);
    ctx.fillStyle = "#2a1a22";
    roundRect(UI.modal.x, UI.modal.y, UI.modal.w, UI.modal.h, 12);
    ctx.fill();
    ctx.strokeStyle = "#5a3540";
    ctx.lineWidth = 2;
    roundRect(UI.modal.x, UI.modal.y, UI.modal.w, UI.modal.h, 12);
    ctx.stroke();
    ctx.fillStyle = "#fff";
    ctx.font = "bold 18px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("¿Reiniciar partida?", UI.modal.x + UI.modal.w / 2, UI.modal.y + 44);
    ctx.font = "13px sans-serif";
    ctx.fillStyle = "rgba(255,255,255,0.7)";
    ctx.fillText("Perderas el progreso actual.", UI.modal.x + UI.modal.w / 2, UI.modal.y + 80);
    drawButton(UI.modalYes, "Si, reiniciar", "#7a3a3a", "#552020", true);
    drawButton(UI.modalNo, "Cancelar", "#1f8a4c", "#16632f", true);
  }

  function drawEndOverlay() {
    if (!state.gameOver && !state.victory) return;
    ctx.fillStyle = "rgba(0,0,0,0.55)";
    ctx.fillRect(0, 0, VW, VH);
    ctx.fillStyle = state.victory ? "#5cb85c" : "#d9534f";
    ctx.font = "bold 56px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(state.victory ? "VICTORIA" : "DERROTA", VW / 2, VH / 2 - 40);
    ctx.fillStyle = "#fff";
    ctx.font = "16px sans-serif";
    ctx.fillText(
      state.victory ? "Has detenido la infeccion. ¡Sistema inmune al maximo!" : "Los patogenos invadieron el organismo.",
      VW / 2, VH / 2 + 8
    );
    drawButton(UI.endRestartBtn, "Reiniciar", "#1f8a4c", "#16632f", true);
  }

  function render() {
    // Map all draw coords into CSS-pixel space, accounting for DPR.
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    clearCanvas();
    drawPath();
    for (var i = 0; i < state.towers.length; i++) drawTower(state.towers[i]);
    for (var j = 0; j < state.enemies.length; j++) drawEnemy(state.enemies[j]);
    for (var k = 0; k < state.projectiles.length; k++) drawProjectile(state.projectiles[k]);
    for (var m = 0; m < state.effects.length; m++) drawEffect(state.effects[m]);
    drawGhost();
    drawHUD();
    drawPanel();
    drawMessage();
    if (state.time - state.lastPlaceFailedAt < 0.25) {
      var a = 1 - (state.time - state.lastPlaceFailedAt) / 0.25;
      ctx.strokeStyle = "rgba(220, 70, 70, " + a + ")";
      ctx.lineWidth = 4;
      ctx.strokeRect(2, FIELD_TOP + 2, VW - 4, FIELD_H - 4);
    }
    drawEndOverlay();
    drawConfirmModal();
  }

  // -------- LOOP ----------------------------------------------------------
  var lastT = performance.now();
  function loop(now) {
    var dt = Math.min(0.05, (now - lastT) / 1000);
    lastT = now;
    state.time += dt;
    if (!state.gameOver && !state.victory && !state.confirmRestart) {
      updateWave(dt);
      updateEnemies(dt);
      updateTowers(dt);
      updateProjectiles(dt);
    }
    updateEffects(dt);
    if (state.msgTimer > 0) state.msgTimer -= dt;
    render();
    requestAnimationFrame(loop);
  }

  window.addEventListener("resize", resize);
  window.addEventListener("orientationchange", resize);
  resize();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
